    :root {
      --bg: #09090b;          /* zinc-950 */
      --panel: #18181b;       /* zinc-900 */
      --panel-2: #27272a;     /* zinc-800 */
      --border: rgba(244,244,245,.10);
      --border-strong: rgba(244,244,245,.18);
      --ink: #e4e4e7;         /* zinc-200 */
      --muted: #a1a1aa;       /* zinc-400 */
      --dim: #71717a;         /* zinc-500 */
      --accent: #5eead4;      /* teal-300 */
      --accent-soft: rgba(94,234,212,.12);
      --accent-strong: #2dd4bf;/* teal-400 */
      --warn: #fbbf24;
      --bad: #f87171;
      --good: #4ade80;
    }
    html, body { background: var(--bg); color: var(--ink); }
    body {
      margin: 0;
      font-family: 'DM Sans', ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      background-image: radial-gradient(ellipse 120% 60% at 50% -10%, rgba(94,234,212,.06), transparent 55%);
      min-height: 100vh;
    }
    .font-serif { font-family: 'Instrument Serif', ui-serif, Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
    .text-accent { color: var(--accent); }
    .bg-accent-soft { background: var(--accent-soft); }
    .border-soft { border-color: var(--border); }
    .border-strong { border-color: var(--border-strong); }
    .bg-panel { background: var(--panel); }
    .bg-panel-2 { background: var(--panel-2); }
    .text-muted { color: var(--muted); }
    .text-dim { color: var(--dim); }
    .scrollbar-tab::-webkit-scrollbar { height: 4px; }
    .scrollbar-tab::-webkit-scrollbar-thumb { background: rgba(244,244,245,.12); border-radius: 2px; }
    /* Subtle focus ring */
    input:focus, textarea:focus, select:focus, button:focus-visible {
      outline: 1px solid var(--accent-strong);
      outline-offset: 1px;
    }
    /* recharts dark tooltip */
    .recharts-default-tooltip {
      background: #0b0b0d !important;
      border: 1px solid var(--border-strong) !important;
      border-radius: 8px !important;
    }
    .recharts-tooltip-label, .recharts-tooltip-item { color: var(--ink) !important; }
    /* Loading splash */
    #splash { position: fixed; inset: 0; display: grid; place-items: center; background: var(--bg); z-index: 50; }
    #splash .ring {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(94,234,212,.25); border-top-color: var(--accent-strong);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* hide tailwind utilities like text-xs from being absent — Tailwind CDN provides them */
  </style>

    /* ---------- Icon wrapper around lucide UMD ---------- */
    function Icon({ name, size = 16, className = "", strokeWidth = 1.75, ...rest }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current || !window.lucide) return;
        const el = ref.current;
        el.innerHTML = "";
        const iconNode = lucide.icons[name] || lucide.icons.Circle;
        const svg = lucide.createElement(iconNode);
        svg.setAttribute("width", String(size));
        svg.setAttribute("height", String(size));
        svg.setAttribute("stroke-width", String(strokeWidth));
        el.appendChild(svg);
      }, [name, size, strokeWidth]);
      return <span ref={ref} className={"inline-flex items-center justify-center " + className} {...rest} />;
    }

        notes: "Mow strip, front slope ornamentals, shade structure.", contractor: "", roi: "Curb appeal" },
      { id: "yard2", title: "Yard — Phase 2", low: 5500, high: 11500, year: 2, priority: "Standard", status: "Not Started",

    const DEFAULT_MILESTONES = [

      { id: "walkthrough",title: "Final walkthrough",    date: "", status: "pending", notes: "" },

      { id: "movein",     title: "Move-in",              date: "", status: "pending", notes: "" },
      { id: "va_license", title: "VA driver's license / plates (within 30 days)", date: "", status: "pending", notes: "" },

    const FIRST_90_DAYS = {
      "Government & Utilities": [
        "Transfer Dominion Energy to your name",
        "Transfer Chesterfield County Water/Sewer",
        "Set up trash & recycling pickup",
        "VA driver's license & plates (within 30 days)",
        "Vehicle safety inspection (VA)",
        "Voter registration update",

      ],
      "Healthcare & Schools": [
        "Pediatrician + adult PCP transfer",

        "School enrollment paperwork",
        "Transfer prescriptions to local pharmacy"
      ],
      "Banking & Insurance": [
        "Update homeowner's policy effective date",
        "Add umbrella liability quote",
        "Update auto insurance to VA address",
        "Update billing addresses (cards, loans, payroll)"
      ],
      "Community Integration": [
        "Introduce yourself to immediate neighbors",
        "Join Riverdowns HOA portal",
        "Visit Robious Landing Park",
        "Tour Pocahontas State Park",
        "Locate nearest grocery + hardware store"
      ]
    };

    const SERVICE_PROVIDERS = [
      { id: "hoa", category: "HOA", name: "Community Group Inc (Riverdowns mgmt)", phone: "804-270-1800", notes: "ARC approvals, dues, reserves." },
      { id: "county_sw", category: "County", name: "Chesterfield Sewer/Water Availability", phone: "", notes: "Email: SWAvailability@chesterfield.gov · GPIN 723-72-16-40-500-000" }
    ];

    /* ---------- Helpers ---------- */
    const fmt$ = (n, opts = {}) => {
      if (n === null || n === undefined || isNaN(n)) return "—";
      const { decimals = 0 } = opts;
      return n.toLocaleString("en-US", { style: "currency", currency: "USD", minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    };
    const fmtPpsf = (n) => isNaN(n) ? "—" : `$${(Math.round(n * 10) / 10).toFixed(1)}/SF`;
    const daysBetween = (isoDate) => {
      if (!isoDate) return null;
      const d = new Date(isoDate + "T00:00:00");
      const now = new Date(); now.setHours(0,0,0,0);
      return Math.round((d - now) / (1000*60*60*24));
    };
    const STATUSES = ["pending", "pass", "fail", "NA"];
    const STATUS_COLORS = {
      pending: "bg-yellow-500/10 text-yellow-300 border border-yellow-500/30",
      pass:    "bg-emerald-500/10 text-emerald-300 border border-emerald-500/30",
      fail:    "bg-rose-500/10 text-rose-300 border border-rose-500/30",
      NA:      "bg-zinc-500/10 text-zinc-300 border border-zinc-500/30"
    };
    const PRIORITY_COLORS = {
      Critical: "bg-rose-500/10 text-rose-300 border border-rose-500/30",
      High:     "bg-amber-500/10 text-amber-300 border border-amber-500/30",
      Standard: "bg-zinc-500/10 text-zinc-300 border border-zinc-500/30",
      Low:      "bg-zinc-500/5 text-zinc-400 border border-zinc-500/20"
    };

    const PROJECT_STATUSES = ["Not Started", "Planning", "In Progress", "Complete"];
    const PROJECT_STATUS_COLORS = {
      "Not Started": "bg-zinc-500/10 text-zinc-300 border border-zinc-500/30",
      "Planning":    "bg-sky-500/10 text-sky-300 border border-sky-500/30",
      "In Progress": "bg-amber-500/10 text-amber-300 border border-amber-500/30",
      "Complete":    "bg-emerald-500/10 text-emerald-300 border border-emerald-500/30"
    };

    /* ---------- Initial state ---------- */
    const initialState = {
      version: 1,
      milestones: DEFAULT_MILESTONES.map(m => ({ ...m })),
      diligence: DEFAULT_DILIGENCE.map(d => ({ ...d })),
      diligenceFindings: "",
      capital: DEFAULT_CAPITAL.map(c => ({ ...c })),
      capitalBudgetCap: 145000,
      offer: {
        price: PROPERTY.purchase_price,
        sellerCredit: 0,
        repairCredit: 0,
        closingCostAssist: 0,
        appraisedValue: PROPERTY.purchase_price
      },
      finance: {
        downPaymentPct: 20,
        interestRate: 6.75,
        termYears: 30,
        propertyTaxAnnual: PROPERTY.tax_annual_estimate,
        insuranceAnnual: PROPERTY.insurance_default,
        hoaAnnual: PROPERTY.hoa.annual,
        appreciationPct: 3
      },
      providers: SERVICE_PROVIDERS.map(p => ({ ...p })),
      diligenceBadges: { sewer: "yellow", hvac: "yellow", roof: "yellow", crawl: "yellow", radon: "yellow", termite: "yellow" }
    };

    function reducer(state, action) {
      switch (action.type) {
        case "REPLACE_STATE": return { ...action.payload };
        case "RESET":         return JSON.parse(JSON.stringify(initialState));
        case "PATCH":         return { ...state, ...action.payload };
        case "PATCH_FINANCE": return { ...state, finance: { ...state.finance, ...action.payload } };
        case "PATCH_OFFER":   return { ...state, offer:   { ...state.offer,   ...action.payload } };
        case "SET_FINDINGS":  return { ...state, diligenceFindings: action.payload };
        case "SET_BUDGET":    return { ...state, capitalBudgetCap: action.payload };
        case "UPDATE_DILIGENCE":
          return { ...state, diligence: state.diligence.map(d => d.id === action.id ? { ...d, ...action.patch } : d) };
        case "ADD_DILIGENCE":
          return { ...state, diligence: [...state.diligence, action.item] };
        case "REMOVE_DILIGENCE":
          return { ...state, diligence: state.diligence.filter(d => d.id !== action.id) };
        case "UPDATE_MILESTONE":
          return { ...state, milestones: state.milestones.map(m => m.id === action.id ? { ...m, ...action.patch } : m) };
        case "ADD_MILESTONE":
          return { ...state, milestones: [...state.milestones, action.item] };
        case "REMOVE_MILESTONE":
          return { ...state, milestones: state.milestones.filter(m => m.id !== action.id) };
        case "UPDATE_PROJECT":
          return { ...state, capital: state.capital.map(c => c.id === action.id ? { ...c, ...action.patch } : c) };
        case "ADD_PROJECT":
          return { ...state, capital: [...state.capital, action.item] };
        case "REMOVE_PROJECT":
          return { ...state, capital: state.capital.filter(c => c.id !== action.id) };
        case "UPDATE_PROVIDER":
          return { ...state, providers: state.providers.map(p => p.id === action.id ? { ...p, ...action.patch } : p) };
        case "ADD_PROVIDER":
          return { ...state, providers: [...state.providers, action.item] };
        case "REMOVE_PROVIDER":
          return { ...state, providers: state.providers.filter(p => p.id !== action.id) };
        case "SET_BADGE":
          return { ...state, diligenceBadges: { ...state.diligenceBadges, [action.id]: action.color } };
        default: return state;
      }
    }

    /* ---------- Reusable atoms ---------- */
    function Card({ children, className = "" }) {
      return (
        <div className={"bg-panel border border-soft rounded-xl " + className} style={{ borderColor: "var(--border)" }}>
          {children}
        </div>
      );
    }
    function StatTile({ label, value, sub, accent = false }) {
      return (
        <div className="bg-panel border rounded-xl p-4" style={{ borderColor: "var(--border)" }}>
          <div className="text-[11px] uppercase tracking-wider text-dim">{label}</div>
          <div className={"font-serif text-2xl mt-1 " + (accent ? "text-accent" : "text-zinc-100")}>{value}</div>
          {sub && <div className="text-xs text-muted mt-1">{sub}</div>}
        </div>
      );
    }
    function Field({ label, hint, children }) {
      return (
        <label className="block">
          <div className="text-[11px] uppercase tracking-wider text-dim mb-1">{label}</div>
          {children}
          {hint && <div className="text-[11px] text-dim mt-1">{hint}</div>}
        </label>
      );
    }
    function TextInput(props) {
      return <input {...props} className={"w-full bg-zinc-950/60 border rounded-md px-3 py-2 text-sm text-zinc-100 placeholder:text-dim " + (props.className || "")} style={{ borderColor: "var(--border-strong)" }} />;
    }
    function NumberInput({ value, onChange, min, max, step = 1, suffix, className = "" }) {
      return (
        <div className={"flex items-center bg-zinc-950/60 border rounded-md " + className} style={{ borderColor: "var(--border-strong)" }}>
          <input type="number" value={value} min={min} max={max} step={step}
            onChange={(e) => onChange(e.target.value === "" ? "" : Number(e.target.value))}
            className="w-full bg-transparent px-3 py-2 text-sm text-zinc-100 outline-none" />
          {suffix && <span className="px-2 text-xs text-dim">{suffix}</span>}
        </div>
      );
    }
    function Select({ value, onChange, options, className = "" }) {
      return (
        <select value={value} onChange={e => onChange(e.target.value)}
          className={"w-full bg-zinc-950/60 border rounded-md px-3 py-2 text-sm text-zinc-100 " + className}
          style={{ borderColor: "var(--border-strong)" }}>
          {options.map(o => typeof o === "string"
            ? <option key={o} value={o}>{o}</option>
            : <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      );
    }
    function Pill({ children, className = "" }) {
      return <span className={"inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium " + className}>{children}</span>;
    }
    function Section({ title, eyebrow, right, children }) {
      return (
        <section className="mb-8">
          <div className="flex items-end justify-between mb-3">
            <div>
              {eyebrow && <div className="text-[11px] uppercase tracking-[0.18em] text-accent/80">{eyebrow}</div>}
              <h2 className="font-serif text-2xl text-zinc-100">{title}</h2>
            </div>
            {right}
          </div>
          {children}
        </section>
      );
    }

    /* ---------- TAB 1: DASHBOARD ---------- */
    function DashboardTab({ state, dispatch }) {
      const closingMilestone = state.milestones.find(m => m.id === "closing");
      const moveinMilestone = state.milestones.find(m => m.id === "movein");
      const closingDays = daysBetween(closingMilestone?.date);
      const moveinDays = daysBetween(moveinMilestone?.date);

      const totalCapitalLow = useMemo(() => state.capital.reduce((a, c) => a + Number(c.low || 0), 0), [state.capital]);
      const totalCapitalHigh = useMemo(() => state.capital.reduce((a, c) => a + Number(c.high || 0), 0), [state.capital]);
      const phase = useMemo(() => {
        const done = (id) => state.milestones.find(m => m.id === id)?.status === "done";
        if (!done("offer")) return "Inspection / Negotiation";
        if (!done("closing")) return "Closing";
        if (!done("movein")) return "Move-In";
        const yearsSinceMovein = moveinMilestone?.date
          ? (Date.now() - new Date(moveinMilestone.date).getTime()) / (1000*60*60*24*365)
          : 0;
        if (yearsSinceMovein < 2) return "Year 1–2";
        return "Year 3–5";
      }, [state.milestones, moveinMilestone]);

      const ppsf = PROPERTY.purchase_price / PROPERTY.sqft;
      const setBadge = (id, color) => dispatch({ type: "SET_BADGE", id, color });
      const badgeOrder = [
        { id: "sewer", label: "Sewer/Septic" },
        { id: "hvac", label: "HVAC age" },
        { id: "roof", label: "Roof life" },
        { id: "crawl", label: "Crawl space" },
        { id: "radon", label: "Radon" },
        { id: "termite", label: "Termite" }
      ];
      const badgeColor = (c) => c === "green"
        ? "bg-emerald-500/15 text-emerald-300 border-emerald-500/30"
        : c === "yellow"
        ? "bg-amber-500/15 text-amber-300 border-amber-500/30"
        : "bg-rose-500/15 text-rose-300 border-rose-500/30";

      return (
        <div>
          <Section
            eyebrow="Property"
            title={PROPERTY.address}
            right={<Pill className="bg-accent-soft text-accent border border-teal-400/30">Phase · {phase}</Pill>}
          >
            <Card className="p-5">
              <div className="grid md:grid-cols-3 gap-5">
                <div>
                  <div className="text-xs text-dim uppercase tracking-wider">Subdivision</div>
                  <div className="text-zinc-100">{PROPERTY.subdivision}</div>
                  <div className="text-xs text-muted mt-1">{PROPERTY.corridor}</div>
                </div>
                <div>
                  <div className="text-xs text-dim uppercase tracking-wider">Specs</div>
                  <div className="text-zinc-100">{PROPERTY.sqft.toLocaleString()} sqft · {PROPERTY.beds} bd · {PROPERTY.baths} ba</div>
                  <div className="text-xs text-muted mt-1">{PROPERTY.garage}-car · {PROPERTY.lot_acres} ac · Built {PROPERTY.built}</div>
                </div>
                <div>
                  <div className="text-xs text-dim uppercase tracking-wider">Construction</div>
                  <div className="text-zinc-100">{PROPERTY.construction}</div>
                  <div className="text-xs text-muted mt-1">RAAM {PROPERTY.raam_v41}/{PROPERTY.raam_v41_max} · Richmond v2 {PROPERTY.raam_richmond_v2}/100</div>
                </div>
              </div>
            </Card>
          </Section>

          <Section title="Key Metrics">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <StatTile label="Purchase Price" value={fmt$(PROPERTY.purchase_price)} sub={`List ${fmt$(PROPERTY.list_price)}`} accent />
              <StatTile label="Price / SF" value={fmtPpsf(ppsf)} sub={`Comp $${COMP_PPSF_LOW}–$${COMP_PPSF_HIGH}/SF`} />
              <StatTile label="RAAM v4.1" value={`${PROPERTY.raam_v41}/${PROPERTY.raam_v41_max}`} sub={`Richmond v2 ${PROPERTY.raam_richmond_v2}/100`} />
              <StatTile label="Capital Plan (5yr)" value={`${fmt$(totalCapitalLow)}–${fmt$(totalCapitalHigh)}`} sub={`Cap ${fmt$(state.capitalBudgetCap)}`} />
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-3">
              <StatTile label="HOA Annual" value={fmt$(PROPERTY.hoa.annual)} sub={`Reserves ${fmt$(PROPERTY.hoa.reserves)} · ${PROPERTY.hoa.reserves_date}`} />
              <StatTile label="County Assessment" value={fmt$(PROPERTY.county_assessment)} sub={`Δ vs purchase ${fmt$(PROPERTY.purchase_price - PROPERTY.county_assessment)}`} />
              <StatTile label="Lot" value={`${PROPERTY.lot_acres} ac`} sub={`${Math.round(PROPERTY.lot_acres*43560).toLocaleString()} sqft`} />
              <StatTile label="Schools" value="ES 7 · MS 7 · HS 6" sub="Bettie Weaver · Robious · James River" />
            </div>
          </Section>

          <Section title="Milestone Countdown">
            <div className="grid md:grid-cols-2 gap-3">
              <Card className="p-4">
                <div className="flex items-center justify-between gap-2">
                  <div>
                    <div className="text-[11px] uppercase tracking-wider text-dim">Closing date</div>
                    <div className="font-serif text-2xl text-zinc-100">
                      {closingMilestone?.date || "—"}
                    </div>
                    <div className="text-xs text-muted mt-1">
                      {closingDays === null ? "Set a date to begin tracking" :
                        closingDays >= 0 ? `${closingDays} days remaining` : `Closed ${Math.abs(closingDays)} days ago`}
                    </div>
                  </div>
                  <input type="date" value={closingMilestone?.date || ""}
                    onChange={(e) => dispatch({ type: "UPDATE_MILESTONE", id: "closing", patch: { date: e.target.value } })}
                    className="bg-zinc-950/60 border rounded-md px-3 py-2 text-sm text-zinc-100"
                    style={{ borderColor: "var(--border-strong)" }} />
                </div>
              </Card>
              <Card className="p-4">
                <div className="flex items-center justify-between gap-2">
                  <div>
                    <div className="text-[11px] uppercase tracking-wider text-dim">Move-in date</div>
                    <div className="font-serif text-2xl text-zinc-100">
                      {moveinMilestone?.date || "—"}
                    </div>
                    <div className="text-xs text-muted mt-1">
                      {moveinDays === null ? "Set a date to begin tracking" :
                        moveinDays >= 0 ? `${moveinDays} days remaining` : `Moved in ${Math.abs(moveinDays)} days ago`}
                    </div>
                  </div>
                  <input type="date" value={moveinMilestone?.date || ""}
                    onChange={(e) => dispatch({ type: "UPDATE_MILESTONE", id: "movein", patch: { date: e.target.value } })}
                    className="bg-zinc-950/60 border rounded-md px-3 py-2 text-sm text-zinc-100"
                    style={{ borderColor: "var(--border-strong)" }} />
                </div>
              </Card>
            </div>
          </Section>

          <Section title="Critical Diligence — Quick Status">
            <Card className="p-4">
              <div className="text-xs text-muted mb-3">Tap a badge to cycle red → yellow → green. Use the Inspection tab for full notes.</div>
              <div className="flex flex-wrap gap-2">
                {badgeOrder.map(b => {
                  const c = state.diligenceBadges[b.id] || "yellow";
                  const next = c === "red" ? "yellow" : c === "yellow" ? "green" : "red";
                  return (
                    <button key={b.id}
                      onClick={() => setBadge(b.id, next)}
                      className={"inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs border " + badgeColor(c)}>
                      <span className={"w-1.5 h-1.5 rounded-full " + (c === "green" ? "bg-emerald-400" : c === "yellow" ? "bg-amber-400" : "bg-rose-400")} />
                      {b.label}
                    </button>
                  );
                })}
              </div>
            </Card>
          </Section>
        </div>
      );
    }

    /* ---------- TAB 2: INSPECTION & DILIGENCE ---------- */
    function InspectionTab({ state, dispatch }) {
      const [draft, setDraft] = useState({ title: "", priority: "Standard" });
      const totals = useMemo(() => {
        const counts = { pass: 0, fail: 0, pending: 0, NA: 0 };
        state.diligence.forEach(d => counts[d.status] = (counts[d.status] || 0) + 1);
        const done = state.diligence.filter(d => d.done).length;
        return { ...counts, done, total: state.diligence.length };
      }, [state.diligence]);

      const addItem = () => {
        const t = draft.title.trim();
        if (!t) return;
        const id = "custom_" + Date.now().toString(36);
        dispatch({ type: "ADD_DILIGENCE", item: { id, title: t, priority: draft.priority, status: "pending", done: false, notes: "" } });
        setDraft({ title: "", priority: "Standard" });
      };

      return (
        <div>
          <Section eyebrow="Diligence" title="Inspection & Diligence Tracker">
            <Card className="p-4 mb-4">
              <div className="flex flex-wrap items-center gap-3 text-sm">
                <span className="text-muted">{totals.done} of {totals.total} complete</span>
                <span className="h-3 w-px bg-zinc-700" />
                <Pill className={STATUS_COLORS.pass}>{totals.pass} pass</Pill>
                <Pill className={STATUS_COLORS.fail}>{totals.fail} fail</Pill>
                <Pill className={STATUS_COLORS.pending}>{totals.pending} pending</Pill>
                <Pill className={STATUS_COLORS.NA}>{totals.NA} N/A</Pill>
              </div>
              <div className="mt-3 h-1.5 w-full bg-zinc-800 rounded-full overflow-hidden">
                <div className="h-full bg-teal-400" style={{ width: `${(totals.done / Math.max(1,totals.total)) * 100}%` }} />
              </div>
            </Card>

            <div className="space-y-3">
              {state.diligence.map(item => (
                <Card key={item.id} className="p-4">
                  <div className="flex items-start gap-3">
                    <button
                      onClick={() => dispatch({ type: "UPDATE_DILIGENCE", id: item.id, patch: { done: !item.done } })}
                      className={"mt-0.5 w-5 h-5 rounded border flex items-center justify-center " + (item.done ? "bg-teal-400/20 border-teal-400" : "bg-zinc-950 border-zinc-700")}
                      aria-label={item.done ? "Mark incomplete" : "Mark complete"}
                    >
                      {item.done && <Icon name="Check" size={12} />}
                    </button>
                    <div className="flex-1 min-w-0">
                      <div className="flex flex-wrap items-center gap-2">
                        <div className={"text-sm font-medium " + (item.done ? "line-through text-dim" : "text-zinc-100")}>{item.title}</div>
                        <Pill className={PRIORITY_COLORS[item.priority] || PRIORITY_COLORS.Standard}>{item.priority}</Pill>
                        <Pill className={STATUS_COLORS[item.status]}>{item.status}</Pill>
                      </div>
                      <div className="grid md:grid-cols-[160px_1fr_auto] gap-2 mt-3">
                        <Select value={item.status}
                          onChange={(v) => dispatch({ type: "UPDATE_DILIGENCE", id: item.id, patch: { status: v } })}
                          options={STATUSES} />
                        <TextInput placeholder="Notes (inspector findings, contractor quotes, etc.)"
                          value={item.notes}
                          onChange={(e) => dispatch({ type: "UPDATE_DILIGENCE", id: item.id, patch: { notes: e.target.value } })} />
                        {item.id.startsWith("custom_") &&
                          <button onClick={() => dispatch({ type: "REMOVE_DILIGENCE", id: item.id })}
                            className="text-xs text-dim hover:text-rose-300 px-2"><Icon name="Trash2" size={14} /></button>}
                      </div>
                    </div>
                  </div>
                </Card>
              ))}
            </div>

            <Card className="p-4 mt-4">
              <div className="text-[11px] uppercase tracking-wider text-dim mb-2">Add custom diligence item</div>
              <div className="grid md:grid-cols-[1fr_180px_auto] gap-2">
                <TextInput placeholder="e.g. Survey verification" value={draft.title}
                  onChange={(e) => setDraft({ ...draft, title: e.target.value })} />
                <Select value={draft.priority} onChange={(v) => setDraft({ ...draft, priority: v })}
                  options={["Critical", "High", "Standard", "Low"]} />
                <button onClick={addItem}
                  className="px-3 py-2 text-sm rounded-md border border-teal-400/40 text-teal-300 hover:bg-teal-400/10">
                  Add item
                </button>
              </div>
            </Card>
          </Section>

          <Section title="Findings Summary">
            <Card className="p-4">
              <textarea
                value={state.diligenceFindings}
                onChange={(e) => dispatch({ type: "SET_FINDINGS", payload: e.target.value })}
                rows={8}
                placeholder="Capture inspector narrative, contractor estimates, photos to follow up on, and your own observations from the walkthrough."
                className="w-full bg-zinc-950/60 border rounded-md px-3 py-2 text-sm text-zinc-100 placeholder:text-dim"
                style={{ borderColor: "var(--border-strong)" }}
              />
            </Card>
          </Section>
        </div>
      );
    }

    /* ---------- TAB 3: NEGOTIATION WORKBENCH ---------- */
    function NegotiationTab({ state, dispatch }) {
      const o = state.offer;
      const offerPpsf = (Number(o.price) || 0) / PROPERTY.sqft;
      const concessions = (Number(o.sellerCredit) || 0) + (Number(o.repairCredit) || 0) + (Number(o.closingCostAssist) || 0);
      const netEffective = (Number(o.price) || 0) - concessions;
      const deltaList = (Number(o.price) || 0) - PROPERTY.list_price;
      const deltaAssessment = (Number(o.price) || 0) - PROPERTY.county_assessment;
      const priceToRaam = ((Number(o.price) || 0) / 1000) / PROPERTY.raam_v41;

      const compLow = COMP_PPSF_LOW * PROPERTY.sqft;
      const compHigh = COMP_PPSF_HIGH * PROPERTY.sqft;
      const compMid = (compLow + compHigh) / 2;

      const fillTier = (tier, end = "mid") => {
        const price = end === "low" ? tier.low : end === "high" ? tier.high : Math.round((tier.low + tier.high) / 2);
        dispatch({ type: "PATCH_OFFER", payload: { price } });
      };

      const appraisalGap = Math.max(0, (Number(o.price) || 0) - (Number(o.appraisedValue) || 0));

      const compareData = [
        { label: "Comp low",  value: compLow },
        { label: "Comp high", value: compHigh },
        { label: "Assessment", value: PROPERTY.county_assessment },
        { label: "List",      value: PROPERTY.list_price },
        { label: "Your offer", value: Number(o.price) || 0 },
        { label: "Net effective", value: netEffective }
      ];

      return (
        <div>
          <Section eyebrow="Workbench" title="Negotiation">
            <div className="grid md:grid-cols-2 gap-3">
              <Card className="p-4">
                <div className="text-[11px] uppercase tracking-wider text-dim mb-3">Offer calculator</div>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Offer price">
                    <NumberInput value={o.price} step={1000}
                      onChange={(v) => dispatch({ type: "PATCH_OFFER", payload: { price: v } })} />
                  </Field>
                  <Field label="Appraised value (est.)">
                    <NumberInput value={o.appraisedValue} step={1000}
                      onChange={(v) => dispatch({ type: "PATCH_OFFER", payload: { appraisedValue: v } })} />
                  </Field>
                  <Field label="Seller credit">
                    <NumberInput value={o.sellerCredit} step={500}
                      onChange={(v) => dispatch({ type: "PATCH_OFFER", payload: { sellerCredit: v } })} />
                  </Field>
                  <Field label="Repair credit">
                    <NumberInput value={o.repairCredit} step={500}
                      onChange={(v) => dispatch({ type: "PATCH_OFFER", payload: { repairCredit: v } })} />
                  </Field>
                  <Field label="Closing-cost assist">
                    <NumberInput value={o.closingCostAssist} step={500}
                      onChange={(v) => dispatch({ type: "PATCH_OFFER", payload: { closingCostAssist: v } })} />
                  </Field>
                  <Field label="Total concessions">
                    <div className="px-3 py-2 text-sm rounded-md bg-zinc-950/40 border" style={{ borderColor: "var(--border)" }}>{fmt$(concessions)}</div>
                  </Field>
                </div>
              </Card>
              <Card className="p-4">
                <div className="text-[11px] uppercase tracking-wider text-dim mb-3">Live read-out</div>
                <div className="grid grid-cols-2 gap-3">
                  <StatTile label="Offer $/SF" value={fmtPpsf(offerPpsf)} sub={`Comp $${COMP_PPSF_LOW}–$${COMP_PPSF_HIGH}/SF`} />
                  <StatTile label="Net effective" value={fmt$(netEffective)} sub={`Concessions ${fmt$(concessions)}`} accent />
                  <StatTile label="Δ vs list" value={(deltaList >= 0 ? "+" : "") + fmt$(deltaList)} sub={`List ${fmt$(PROPERTY.list_price)}`} />
                  <StatTile label="Δ vs assessment" value={(deltaAssessment >= 0 ? "+" : "") + fmt$(deltaAssessment)} sub={`Assess ${fmt$(PROPERTY.county_assessment)}`} />
                  <StatTile label="Price-to-RAAM" value={isFinite(priceToRaam) ? `${priceToRaam.toFixed(1)} k/pt` : "—"} sub={`RAAM v4.1 ${PROPERTY.raam_v41}/${PROPERTY.raam_v41_max}`} />
                  <StatTile label="Appraisal gap" value={fmt$(appraisalGap)} sub={appraisalGap > 0 ? "Bring extra cash, or renegotiate" : "No gap at current inputs"} />
                </div>
              </Card>
            </div>
          </Section>

          <Section title="RAAM tiers · one-click fill">
            <div className="grid md:grid-cols-3 gap-3">
              {NEGOTIATION_TIERS.map(t => (
                <Card key={t.id} className="p-4">
                  <div className="text-sm text-zinc-100 font-medium">{t.name}</div>
                  <div className="font-serif text-2xl text-accent mt-1">{fmt$(t.low)}–{fmt$(t.high)}</div>
                  <div className="text-xs text-muted mt-1">{t.scenario}</div>
                  <div className="flex gap-1.5 mt-3">
                    <button onClick={() => fillTier(t, "low")}
                      className="px-2.5 py-1 text-xs rounded-md border border-teal-400/40 text-teal-300 hover:bg-teal-400/10">Use low</button>
                    <button onClick={() => fillTier(t, "mid")}
                      className="px-2.5 py-1 text-xs rounded-md border border-teal-400/40 text-teal-300 hover:bg-teal-400/10">Use mid</button>
                    <button onClick={() => fillTier(t, "high")}
                      className="px-2.5 py-1 text-xs rounded-md border border-teal-400/40 text-teal-300 hover:bg-teal-400/10">Use high</button>
                  </div>
                </Card>
              ))}
            </div>
          </Section>

          <Section title="Price comparison">
            <Card className="p-4">
              <div className="h-64 -mx-2">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={compareData} layout="vertical" margin={{ left: 16, right: 16, top: 8, bottom: 8 }}>
                    <CartesianGrid stroke="rgba(244,244,245,0.06)" />
                    <XAxis type="number" tick={{ fill: "#a1a1aa", fontSize: 11 }} tickFormatter={(v) => "$" + Math.round(v/1000) + "k"} domain={[ Math.floor(Math.min(compLow, PROPERTY.county_assessment, netEffective) * 0.95 / 50000) * 50000, Math.ceil(Math.max(compHigh, PROPERTY.list_price, Number(o.price) || 0) * 1.02 / 50000) * 50000 ]} />
                    <YAxis type="category" dataKey="label" tick={{ fill: "#e4e4e7", fontSize: 12 }} width={120} />
                    <Tooltip formatter={(v) => fmt$(v)} cursor={{ fill: "rgba(94,234,212,0.06)" }} />
                    <Bar dataKey="value" fill="#5eead4" radius={[2, 2, 2, 2]} />
                    <ReferenceLine x={compMid} stroke="#fbbf24" strokeDasharray="3 3" label={{ value: "Comp mid", fill: "#fbbf24", fontSize: 10, position: "top" }} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
              <div className="text-xs text-muted mt-2">Comp range computed from {COMP_PPSF_LOW}–{COMP_PPSF_HIGH}$/SF × {PROPERTY.sqft.toLocaleString()} SF.</div>
            </Card>
          </Section>

          <Section title="Leverage points">
            <Card className="p-4">
              <ul className="space-y-2">
                {LEVERAGE_POINTS.map((p, i) => (
                  <li key={i} className="flex items-start gap-2 text-sm text-zinc-200">
                    <span className="mt-1.5 w-1.5 h-1.5 rounded-full bg-teal-400 shrink-0" />
                    <span>{p}</span>
                  </li>
                ))}
              </ul>
            </Card>
          </Section>

          <Section title="Appraisal gap planner">
            <Card className="p-4">
              {appraisalGap === 0 ? (
                <div className="text-sm text-emerald-300">No gap at current inputs — appraisal supports your offer.</div>
              ) : (
                <div className="space-y-2 text-sm">
                  <div>Gap: <span className="font-serif text-accent text-xl">{fmt$(appraisalGap)}</span></div>
                  <div className="text-muted">Three standard responses:</div>
                  <ol className="list-decimal pl-5 text-zinc-200 space-y-1">
                    <li>Bring extra cash to closing to cover the shortfall.</li>
                    <li>Renegotiate the contract price down toward the appraised value.</li>
                    <li>Walk away under your appraisal contingency (if elected at offer).</li>
                  </ol>
                </div>
              )}
            </Card>
          </Section>
        </div>
      );
    }

    /* ---------- TAB 4: CLOSING & MOVE-IN TIMELINE ---------- */
    function ClosingTab({ state, dispatch }) {
      const [draft, setDraft] = useState({ title: "", date: "" });
      const [check90, setCheck90] = useState({}); // local-only checkbox state

      const sortedMilestones = useMemo(() => {
        return [...state.milestones].sort((a, b) => {
          if (!a.date && !b.date) return 0;
          if (!a.date) return 1;
          if (!b.date) return -1;
          return a.date.localeCompare(b.date);
        });
      }, [state.milestones]);

      const addMilestone = () => {
        const t = draft.title.trim();
        if (!t) return;
        const id = "m_" + Date.now().toString(36);
        dispatch({ type: "ADD_MILESTONE", item: { id, title: t, date: draft.date, status: "pending", notes: "" } });
        setDraft({ title: "", date: "" });
      };

      const setStatus = (id, status) => dispatch({ type: "UPDATE_MILESTONE", id, patch: { status } });

      const stStyle = (s) => s === "done"
        ? "bg-emerald-500/15 text-emerald-300 border-emerald-500/30"
        : s === "in_progress"
        ? "bg-amber-500/15 text-amber-300 border-amber-500/30"
        : "bg-zinc-500/15 text-zinc-300 border-zinc-500/30";

      return (
        <div>
          <Section eyebrow="Timeline" title="Closing & Move-In">
            <Card className="p-4">
              <div className="text-xs text-muted">Edit a date to anchor a milestone. Items sort by date — undated items drop to the bottom. Status cycles pending → in progress → done.</div>
            </Card>

            <div className="mt-4 relative">
              <div className="absolute left-[7px] top-0 bottom-0 w-px bg-zinc-800" aria-hidden="true" />
              <ul className="space-y-3">
                {sortedMilestones.map((m, idx) => {
                  const days = daysBetween(m.date);
                  const isCustom = m.id.startsWith("m_");
                  return (
                    <li key={m.id} className="relative pl-7">
                      <span className={"absolute left-0 top-3 w-3.5 h-3.5 rounded-full border-2 " +
                        (m.status === "done" ? "bg-emerald-400 border-emerald-300" :
                         m.status === "in_progress" ? "bg-amber-400 border-amber-300" :
                         "bg-zinc-900 border-zinc-600")} />
                      <Card className="p-3">
                        <div className="flex items-start justify-between gap-2">
                          <div className="min-w-0 flex-1">
                            <div className="flex flex-wrap items-center gap-2">
                              <div className="text-sm font-medium text-zinc-100">{m.title}</div>
                              <Pill className={"border " + stStyle(m.status)}>{m.status === "in_progress" ? "in progress" : m.status}</Pill>
                              {m.date && days !== null && (
                                <span className="text-[11px] text-dim">
                                  {days === 0 ? "today" : days > 0 ? `in ${days} d` : `${Math.abs(days)} d ago`}
                                </span>
                              )}
                            </div>
                            <div className="grid md:grid-cols-[160px_1fr_auto] gap-2 mt-2">
                              <input type="date" value={m.date}
                                onChange={(e) => dispatch({ type: "UPDATE_MILESTONE", id: m.id, patch: { date: e.target.value } })}
                                className="bg-zinc-950/60 border rounded-md px-3 py-2 text-sm text-zinc-100"
                                style={{ borderColor: "var(--border-strong)" }} />
                              <TextInput placeholder="Notes" value={m.notes}
                                onChange={(e) => dispatch({ type: "UPDATE_MILESTONE", id: m.id, patch: { notes: e.target.value } })} />
                              <div className="flex gap-1">
