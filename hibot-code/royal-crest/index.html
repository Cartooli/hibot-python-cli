    /* ---------- TAB 5: RENOVATION & CAPITAL PLANNER ---------- */
    function RenovationTab({ state, dispatch }) {
      const [draft, setDraft] = useState({ title: "", low: 0, high: 0, year: 1, priority: "Standard" });
      const totalLow = useMemo(() => state.capital.reduce((a, c) => a + Number(c.low || 0), 0), [state.capital]);
      const totalHigh = useMemo(() => state.capital.reduce((a, c) => a + Number(c.high || 0), 0), [state.capital]);

      const byYear = useMemo(() => {
        const map = {};
        for (let y = 1; y <= 5; y++) map[y] = { year: "Yr " + y, low: 0, high: 0 };
        state.capital.forEach(c => {
          const y = Math.max(1, Math.min(5, Number(c.year) || 1));
          map[y].low += Number(c.low || 0);
          map[y].high += Number(c.high || 0);
        });
        let cumLow = 0, cumHigh = 0;
        return Object.values(map).map(r => {
          cumLow += r.low; cumHigh += r.high;
          return { ...r, cumLow, cumHigh };
        });
      }, [state.capital]);

      const overBudget = totalHigh > Number(state.capitalBudgetCap || 0);
      const addProject = () => {
        const t = draft.title.trim();
        if (!t) return;
        const id = "p_" + Date.now().toString(36);
        dispatch({ type: "ADD_PROJECT", item: {
          id, title: t,
          low: Number(draft.low) || 0, high: Number(draft.high) || 0,
          year: Number(draft.year) || 1, priority: draft.priority,
          status: "Not Started", notes: "", contractor: "", roi: ""
        }});
        setDraft({ title: "", low: 0, high: 0, year: 1, priority: "Standard" });
      };

      return (
        <div>
          <Section eyebrow="Capital plan" title="Renovation & Capital Planner">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              <StatTile label="Total range" value={`${fmt$(totalLow)}–${fmt$(totalHigh)}`} sub="across all projects" accent />
              <StatTile label="Budget cap" value={fmt$(state.capitalBudgetCap)} sub={overBudget ? "Over by " + fmt$(totalHigh - state.capitalBudgetCap) : "Within range"} />
              <StatTile label="Items planned" value={String(state.capital.length)} sub={`${state.capital.filter(c => c.status === "Complete").length} complete`} />
              <StatTile label="High priority" value={String(state.capital.filter(c => c.priority === "High" || c.priority === "Critical").length)} sub="Critical + High items" />
            </div>

            <Card className="p-4 mb-4">
              <Field label="Budget cap (high-end)">
                <NumberInput value={state.capitalBudgetCap} step={5000}
                  onChange={(v) => dispatch({ type: "SET_BUDGET", payload: Number(v) || 0 })} suffix="USD" />
              </Field>
              <div className={"text-xs mt-2 " + (overBudget ? "text-rose-300" : "text-emerald-300")}>
                {overBudget
                  ? `High-end estimate exceeds your cap by ${fmt$(totalHigh - state.capitalBudgetCap)}.`
                  : `High-end estimate is ${fmt$(state.capitalBudgetCap - totalHigh)} below your cap.`}
              </div>
            </Card>

            <Card className="p-4 mb-4">
              <div className="text-[11px] uppercase tracking-wider text-dim mb-3">Spend by year</div>
              <div className="h-56 -mx-2">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={byYear} margin={{ left: 0, right: 16, top: 8, bottom: 8 }}>
                    <CartesianGrid stroke="rgba(244,244,245,0.06)" vertical={false} />
                    <XAxis dataKey="year" tick={{ fill: "#a1a1aa", fontSize: 11 }} />
                    <YAxis tick={{ fill: "#a1a1aa", fontSize: 11 }} tickFormatter={(v) => "$" + Math.round(v/1000) + "k"} />
                    <Tooltip formatter={(v) => fmt$(v)} cursor={{ fill: "rgba(94,234,212,0.06)" }} />
                    <Legend wrapperStyle={{ fontSize: 11, color: "#a1a1aa" }} />
                    <Bar dataKey="low"  name="Low range"  fill="#2dd4bf" radius={[2,2,0,0]} />
                    <Bar dataKey="high" name="High range" fill="#0d9488" radius={[2,2,0,0]} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
              <div className="text-[11px] uppercase tracking-wider text-dim mt-4 mb-3">Cumulative spend</div>
              <div className="h-44 -mx-2">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={byYear} margin={{ left: 0, right: 16, top: 8, bottom: 8 }}>
                    <defs>
                      <linearGradient id="cumGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%"   stopColor="#5eead4" stopOpacity={0.4} />
                        <stop offset="100%" stopColor="#5eead4" stopOpacity={0.02} />
                      </linearGradient>
                    </defs>
                    <CartesianGrid stroke="rgba(244,244,245,0.06)" vertical={false} />
                    <XAxis dataKey="year" tick={{ fill: "#a1a1aa", fontSize: 11 }} />
                    <YAxis tick={{ fill: "#a1a1aa", fontSize: 11 }} tickFormatter={(v) => "$" + Math.round(v/1000) + "k"} />
                    <Tooltip formatter={(v) => fmt$(v)} />
                    <ReferenceLine y={state.capitalBudgetCap} stroke="#fbbf24" strokeDasharray="3 3" label={{ value: "Cap", fill: "#fbbf24", fontSize: 10, position: "right" }} />
                    <Area type="monotone" dataKey="cumHigh" name="Cumulative high" stroke="#5eead4" fill="url(#cumGrad)" />
                    <Area type="monotone" dataKey="cumLow"  name="Cumulative low"  stroke="#0d9488" fill="transparent" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </Card>

            <div className="space-y-3">
              {state.capital.map(c => (
                <Card key={c.id} className="p-4">
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0 flex-1">
                      <div className="flex flex-wrap items-center gap-2">
                        <div className="text-sm font-medium text-zinc-100">{c.title}</div>
                        <Pill className={PRIORITY_COLORS[c.priority] || PRIORITY_COLORS.Standard}>{c.priority}</Pill>
                        <Pill className={PROJECT_STATUS_COLORS[c.status]}>{c.status}</Pill>
                        <span className="text-[11px] text-dim">Yr {c.year}</span>
                        <span className="text-[11px] text-dim">·</span>
                        <span className="text-[11px] text-accent">{fmt$(c.low)}–{fmt$(c.high)}</span>
                      </div>
                      {c.roi && <div className="text-xs text-muted mt-1">ROI · {c.roi}</div>}
                      <div className="grid md:grid-cols-5 gap-2 mt-3">
                        <Field label="Year">
                          <Select value={String(c.year)}
                            onChange={(v) => dispatch({ type: "UPDATE_PROJECT", id: c.id, patch: { year: Number(v) } })}
                            options={[1,2,3,4,5].map(y => ({ value: String(y), label: "Year " + y }))} />
                        </Field>
                        <Field label="Status">
                          <Select value={c.status}
                            onChange={(v) => dispatch({ type: "UPDATE_PROJECT", id: c.id, patch: { status: v } })}
                            options={PROJECT_STATUSES} />
                        </Field>
                        <Field label="Low estimate">
                          <NumberInput value={c.low} step={500}
                            onChange={(v) => dispatch({ type: "UPDATE_PROJECT", id: c.id, patch: { low: Number(v) || 0 } })} />
                        </Field>
                        <Field label="High estimate">
                          <NumberInput value={c.high} step={500}
                            onChange={(v) => dispatch({ type: "UPDATE_PROJECT", id: c.id, patch: { high: Number(v) || 0 } })} />
                        </Field>
                        <Field label="Priority">
                          <Select value={c.priority}
                            onChange={(v) => dispatch({ type: "UPDATE_PROJECT", id: c.id, patch: { priority: v } })}
                            options={["Critical", "High", "Standard", "Low"]} />
                        </Field>
                      </div>
                      <div className="grid md:grid-cols-2 gap-2 mt-2">
                        <TextInput placeholder="Contractor / contact" value={c.contractor}
                          onChange={(e) => dispatch({ type: "UPDATE_PROJECT", id: c.id, patch: { contractor: e.target.value } })} />
                        <TextInput placeholder="Notes" value={c.notes}
                          onChange={(e) => dispatch({ type: "UPDATE_PROJECT", id: c.id, patch: { notes: e.target.value } })} />
                      </div>
                    </div>
                    {c.id.startsWith("p_") && (
                      <button onClick={() => dispatch({ type: "REMOVE_PROJECT", id: c.id })}
                        className="text-xs text-dim hover:text-rose-300 px-2"><Icon name="Trash2" size={14} /></button>
                    )}
                  </div>
                </Card>
              ))}
            </div>

            <Card className="p-4 mt-4">
              <div className="text-[11px] uppercase tracking-wider text-dim mb-2">Add custom project</div>
              <div className="grid md:grid-cols-[1fr_120px_120px_100px_140px_auto] gap-2">
                <TextInput placeholder="Title (e.g. Deck refinish)" value={draft.title}
                  onChange={(e) => setDraft({ ...draft, title: e.target.value })} />
                <NumberInput value={draft.low} step={500}
                  onChange={(v) => setDraft({ ...draft, low: v })} suffix="low" />
                <NumberInput value={draft.high} step={500}
                  onChange={(v) => setDraft({ ...draft, high: v })} suffix="high" />
                <Select value={String(draft.year)}
                  onChange={(v) => setDraft({ ...draft, year: Number(v) })}
                  options={[1,2,3,4,5].map(y => ({ value: String(y), label: "Yr " + y }))} />
                <Select value={draft.priority} onChange={(v) => setDraft({ ...draft, priority: v })}
                  options={["Critical", "High", "Standard", "Low"]} />
                <button onClick={addProject}
                  className="px-3 py-2 text-sm rounded-md border border-teal-400/40 text-teal-300 hover:bg-teal-400/10">
                  Add
                </button>
              </div>
            </Card>
          </Section>
        </div>
      );
    }

    /* ---------- TAB 6: MARKET & INVESTMENT CONTEXT ---------- */
    function MarketTab({ state, dispatch }) {
      const f = state.finance;
      const purchase = PROPERTY.purchase_price;
      const ppsf = purchase / PROPERTY.sqft;
      const bwLowPpsf = CORRIDOR_MEDIAN_PPSF * (1 + BETTIE_WEAVER_PREMIUM_LOW);
      const bwHighPpsf = CORRIDOR_MEDIAN_PPSF * (1 + BETTIE_WEAVER_PREMIUM_HIGH);
      const ppsfBars = [
        { label: "Corridor median",        value: CORRIDOR_MEDIAN_PPSF },
        { label: "Bettie Weaver +10%",     value: bwLowPpsf },
        { label: "Bettie Weaver +20%",     value: bwHighPpsf },
        { label: "This property",          value: ppsf }
      ];

      // Mortgage payment math
      const downPayment = purchase * (Number(f.downPaymentPct) || 0) / 100;
      const loanAmount = purchase - downPayment;
      const monthlyRate = (Number(f.interestRate) || 0) / 100 / 12;
      const nMonths = (Number(f.termYears) || 0) * 12;
      const piPayment = (monthlyRate > 0 && nMonths > 0)
        ? loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, nMonths)) / (Math.pow(1 + monthlyRate, nMonths) - 1)
        : (nMonths > 0 ? loanAmount / nMonths : 0);
      const monthlyTax = (Number(f.propertyTaxAnnual) || 0) / 12;
      const monthlyIns = (Number(f.insuranceAnnual) || 0) / 12;
      const monthlyHoa = (Number(f.hoaAnnual) || 0) / 12;
      const monthlyTotal = piPayment + monthlyTax + monthlyIns + monthlyHoa;

      // Equity projection
      const totalCapitalMid = state.capital.reduce((a, c) => a + (Number(c.low || 0) + Number(c.high || 0))/2, 0);
      const apprDecimal = (Number(f.appreciationPct) || 0) / 100;
      const equity = useMemo(() => {
        const arr = [];
        for (let y = 0; y <= 10; y++) {
          const value = purchase * Math.pow(1 + apprDecimal, y);
          const invested = purchase + (totalCapitalMid * Math.min(y, 5) / 5);
          arr.push({ year: "Y" + y, value: Math.round(value), invested: Math.round(invested), equity: Math.round(value - invested) });
        }
        return arr;
      }, [apprDecimal, totalCapitalMid, purchase]);

      // Break-even appreciation (year n where total invested = future value)
      const breakEven = (years) => {
        const invested = purchase + totalCapitalMid;
        if (purchase <= 0 || years <= 0) return 0;
        return (Math.pow(invested / purchase, 1 / years) - 1) * 100;
      };

      const rentVsOwn = [
        { label: "Rent",  value: RENT_ZESTIMATE },
        { label: "Own",   value: Math.round(monthlyTotal) }
      ];

      return (
        <div>
          <Section eyebrow="Market" title="Market & Investment Context">
            <Card className="p-4 mb-4">
              <div className="text-[11px] uppercase tracking-wider text-dim mb-2">$/SF comparison</div>
              <div className="h-56 -mx-2">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={ppsfBars} layout="vertical" margin={{ left: 16, right: 16, top: 8, bottom: 8 }}>
                    <CartesianGrid stroke="rgba(244,244,245,0.06)" />
                    <XAxis type="number" tick={{ fill: "#a1a1aa", fontSize: 11 }} tickFormatter={(v) => "$" + Math.round(v) + "/SF"} />
                    <YAxis type="category" dataKey="label" width={150} tick={{ fill: "#e4e4e7", fontSize: 12 }} />
                    <Tooltip formatter={(v) => fmtPpsf(v)} cursor={{ fill: "rgba(94,234,212,0.06)" }} />
                    <Bar dataKey="value" fill="#5eead4" radius={[2,2,2,2]} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
              <div className="text-xs text-muted mt-2">
                Robious corridor median ≈ ${CORRIDOR_MEDIAN_PPSF}/SF · ${CORRIDOR_MEDIAN_PRICE.toLocaleString()} median price.
                Bettie Weaver catchment trades 10–20% premium.
              </div>
            </Card>
          </Section>

          <Section title="Monthly cost estimator">
            <div className="grid md:grid-cols-2 gap-3">
              <Card className="p-4">
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Down payment %">
                    <NumberInput value={f.downPaymentPct} step={0.5}
                      onChange={(v) => dispatch({ type: "PATCH_FINANCE", payload: { downPaymentPct: Number(v) || 0 } })} suffix="%" />
                  </Field>
                  <Field label="Interest rate %">
                    <NumberInput value={f.interestRate} step={0.125}
                      onChange={(v) => dispatch({ type: "PATCH_FINANCE", payload: { interestRate: Number(v) || 0 } })} suffix="%" />
                  </Field>
                  <Field label="Term (years)">
                    <Select value={String(f.termYears)}
                      onChange={(v) => dispatch({ type: "PATCH_FINANCE", payload: { termYears: Number(v) } })}
                      options={["10","15","20","25","30"]} />
                  </Field>
                  <Field label="Property tax (yr)">
                    <NumberInput value={f.propertyTaxAnnual} step={100}
                      onChange={(v) => dispatch({ type: "PATCH_FINANCE", payload: { propertyTaxAnnual: Number(v) || 0 } })} />
                  </Field>
                  <Field label="Insurance (yr)">
                    <NumberInput value={f.insuranceAnnual} step={100}
                      onChange={(v) => dispatch({ type: "PATCH_FINANCE", payload: { insuranceAnnual: Number(v) || 0 } })} />
                  </Field>
                  <Field label="HOA (yr)">
                    <NumberInput value={f.hoaAnnual} step={50}
                      onChange={(v) => dispatch({ type: "PATCH_FINANCE", payload: { hoaAnnual: Number(v) || 0 } })} />
                  </Field>
                </div>
              </Card>
              <Card className="p-4">
                <div className="text-[11px] uppercase tracking-wider text-dim">Monthly breakdown</div>
                <div className="font-serif text-3xl text-accent mt-1">{fmt$(monthlyTotal)}</div>
                <div className="text-xs text-muted mt-1">Down: {fmt$(downPayment)} · Loan: {fmt$(loanAmount)}</div>
                <div className="mt-3 space-y-1.5 text-sm">
                  <Line2 label="Principal & interest" value={piPayment} />
                  <Line2 label="Property tax"         value={monthlyTax} />
                  <Line2 label="Homeowner's insurance" value={monthlyIns} />
                  <Line2 label="HOA"                    value={monthlyHoa} />
                  <div className="border-t pt-2 mt-2" style={{ borderColor: "var(--border)" }}>
                    <Line2 label="Total monthly" value={monthlyTotal} bold />
                  </div>
                </div>
              </Card>
            </div>
          </Section>

          <Section title="Rent vs own">
            <Card className="p-4">
              <div className="grid md:grid-cols-2 gap-4 items-center">
                <div className="h-44 -mx-2">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={rentVsOwn} margin={{ left: 0, right: 16, top: 8, bottom: 8 }}>
                      <CartesianGrid stroke="rgba(244,244,245,0.06)" vertical={false} />
                      <XAxis dataKey="label" tick={{ fill: "#a1a1aa", fontSize: 12 }} />
                      <YAxis tick={{ fill: "#a1a1aa", fontSize: 11 }} tickFormatter={(v) => "$" + Math.round(v/100) + "00"} />
                      <Tooltip formatter={(v) => fmt$(v)} cursor={{ fill: "rgba(94,234,212,0.06)" }} />
                      <Bar dataKey="value" fill="#5eead4" radius={[2,2,0,0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div className="text-sm text-zinc-200">
                  <div className="text-xs text-muted">Corridor rent estimate</div>
                  <div className="font-serif text-2xl text-zinc-100">{fmt$(RENT_ZESTIMATE)}/mo</div>
                  <div className="text-xs text-muted mt-3">Monthly ownership cost</div>
                  <div className="font-serif text-2xl text-accent">{fmt$(monthlyTotal)}/mo</div>
                  <div className="text-xs text-muted mt-3">
                    Δ: <span className={monthlyTotal > RENT_ZESTIMATE ? "text-amber-300" : "text-emerald-300"}>
                      {(monthlyTotal - RENT_ZESTIMATE >= 0 ? "+" : "") + fmt$(monthlyTotal - RENT_ZESTIMATE)}/mo
                    </span> {monthlyTotal > RENT_ZESTIMATE ? "owning costs more cash flow" : "owning costs less cash flow"}
                  </div>
                </div>
              </div>
              <div className="text-[11px] text-dim mt-2">Note: ownership includes building equity and mortgage interest deduction; raw monthly comparison ignores both.</div>
            </Card>
          </Section>

          <Section title="Equity position over 10 years">
            <Card className="p-4">
              <div className="grid md:grid-cols-2 gap-3 mb-3">
                <Field label={`Appreciation rate (annual %)`}>
                  <NumberInput value={f.appreciationPct} step={0.25}
                    onChange={(v) => dispatch({ type: "PATCH_FINANCE", payload: { appreciationPct: Number(v) || 0 } })} suffix="%" />
                </Field>
                <div className="text-xs text-muted self-end">
                  Total invested = purchase + capital plan ({fmt$(Math.round(totalCapitalMid))} mid-range, spread over 5 yrs).
                </div>
              </div>
              <div className="h-56 -mx-2">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={equity} margin={{ left: 0, right: 16, top: 8, bottom: 8 }}>
                    <defs>
                      <linearGradient id="eqGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%"   stopColor="#5eead4" stopOpacity={0.4} />
                        <stop offset="100%" stopColor="#5eead4" stopOpacity={0.02} />
                      </linearGradient>
                    </defs>
                    <CartesianGrid stroke="rgba(244,244,245,0.06)" vertical={false} />
                    <XAxis dataKey="year" tick={{ fill: "#a1a1aa", fontSize: 11 }} />
                    <YAxis tick={{ fill: "#a1a1aa", fontSize: 11 }} tickFormatter={(v) => "$" + Math.round(v/1000) + "k"} />
                    <Tooltip formatter={(v) => fmt$(v)} />
                    <Legend wrapperStyle={{ fontSize: 11, color: "#a1a1aa" }} />
                    <Area type="monotone" dataKey="value"    name="Estimated value" stroke="#5eead4" fill="url(#eqGrad)" />
                    <Area type="monotone" dataKey="invested" name="Total invested"  stroke="#fbbf24" fill="transparent" strokeDasharray="4 4" />
                    <Area type="monotone" dataKey="equity"   name="Equity position" stroke="#4ade80" fill="transparent" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
              <div className="grid md:grid-cols-3 gap-2 mt-3">
                {[5,7,10].map(y => {
                  const r = equity[y];
                  return (
                    <Card key={y} className="p-3">
                      <div className="text-[11px] uppercase tracking-wider text-dim">Year {y}</div>
                      <div className="font-serif text-xl text-zinc-100">{fmt$(r.value)}</div>
                      <div className="text-xs text-muted">Invested {fmt$(r.invested)} · Equity {fmt$(r.equity)}</div>
                    </Card>
                  );
                })}
              </div>
            </Card>
          </Section>

          <Section title="Break-even appreciation">
            <Card className="p-4">
              <div className="text-xs text-muted mb-3">
                Annual appreciation required for total invested ({fmt$(purchase + totalCapitalMid)}) to equal future value at year n:
              </div>
              <div className="grid md:grid-cols-3 gap-2">
                {[5,7,10].map(y => {
                  const r = breakEven(y);
                  return (
                    <Card key={y} className="p-3">
                      <div className="text-[11px] uppercase tracking-wider text-dim">Year {y}</div>
                      <div className="font-serif text-xl text-accent">{r.toFixed(2)}%/yr</div>
                      <div className="text-xs text-muted">Compared to assumption {f.appreciationPct}%/yr</div>
                    </Card>
                  );
                })}
              </div>
            </Card>
          </Section>
        </div>
      );
    }

    function Line2({ label, value, bold = false }) {
      return (
        <div className="flex items-center justify-between">
          <span className={"text-zinc-300 " + (bold ? "font-medium text-zinc-100" : "")}>{label}</span>
          <span className={"font-serif " + (bold ? "text-accent text-lg" : "text-zinc-100")}>{fmt$(value)}</span>
        </div>
      );
    }

    /* ---------- TAB 7: COMMUNITY & RESOURCES ---------- */
    function CommunityTab({ state, dispatch }) {
      const [draft, setDraft] = useState({ category: "Plumber", name: "", phone: "", notes: "" });
      const addProvider = () => {
        const n = draft.name.trim();
        if (!n) return;
        const id = "sp_" + Date.now().toString(36);
        dispatch({ type: "ADD_PROVIDER", item: { id, ...draft, name: n } });
        setDraft({ category: "Plumber", name: "", phone: "", notes: "" });
      };

      const KEY_CONTACTS = [
        { label: "Chesterfield County (general)", value: "https://www.chesterfield.gov", display: "chesterfield.gov" },
        { label: "Sewer/Water Availability",       value: "mailto:SWAvailability@chesterfield.gov", display: "SWAvailability@chesterfield.gov" },
        { label: "School enrollment portal",       value: "https://mychesterfieldschools.com", display: "mychesterfieldschools.com" },
        { label: "Riverdowns HOA · Community Group Inc", value: "tel:8042701800", display: "804-270-1800" },
        { label: "Dominion Energy",                value: "https://www.dominionenergy.com", display: "dominionenergy.com" },
        { label: "Chesterfield Water/Sewer",       value: "https://www.chesterfield.gov/170/Utilities", display: "chesterfield.gov/Utilities" }
      ];

      const NEARBY = [
        { name: "Harrowgate Shopping Center", note: "Daily errands · grocery anchors" },
        { name: "Robious Landing Park",       note: "James River access · trails · kayak launch" },
        { name: "Pocahontas State Park",      note: "8,000 acres of trails, lake, swimming" },
        { name: "Rt 288 / I-64 access",       note: "Fastest commute connectors" }
      ];

      return (
        <div>
          <Section eyebrow="Community" title="Resources & Contacts">
            <Card className="p-4">
              <div className="text-[11px] uppercase tracking-wider text-dim mb-3">Key contacts & links</div>
              <ul className="grid md:grid-cols-2 gap-2">
                {KEY_CONTACTS.map((c, i) => (
                  <li key={i} className="flex items-start gap-2">
                    <Icon name="ChevronRight" size={14} className="text-accent mt-0.5" />
                    <div className="min-w-0">
                      <div className="text-sm text-zinc-100">{c.label}</div>
                      <a href={c.value} target="_blank" rel="noopener" className="text-xs text-accent hover:underline break-all">{c.display}</a>
                    </div>
                  </li>
                ))}
              </ul>
            </Card>
          </Section>

          <Section title="Schools">
            <div className="grid md:grid-cols-3 gap-3">
              {PROPERTY.schools.map((s, i) => (
                <Card key={i} className="p-4">
                  <div className="flex items-center justify-between">
                    <div className="text-[11px] uppercase tracking-wider text-dim">{s.level}</div>
                    <Pill className={s.rating >= 7 ? "bg-emerald-500/15 text-emerald-300 border border-emerald-500/30" : "bg-amber-500/15 text-amber-300 border border-amber-500/30"}>
                      {s.rating}/10
                    </Pill>
                  </div>
                  <div className="font-serif text-lg text-zinc-100 mt-1">{s.name}</div>
                  <div className="text-xs text-muted mt-1">{s.address}</div>
                  <div className="text-xs text-zinc-300 mt-2">{s.notes}</div>
                </Card>
              ))}
            </div>
          </Section>

          <Section title="HOA quick reference">
            <Card className="p-4">
              <div className="grid md:grid-cols-3 gap-4">
                <div>
                  <div className="text-[11px] uppercase tracking-wider text-dim">Annual fee</div>
                  <div className="font-serif text-2xl text-zinc-100">{fmt$(PROPERTY.hoa.annual)}</div>
                  <div className="text-xs text-muted">{PROPERTY.hoa.year}</div>
                </div>
                <div>
                  <div className="text-[11px] uppercase tracking-wider text-dim">Reserves</div>
                  <div className="font-serif text-2xl text-zinc-100">{fmt$(PROPERTY.hoa.reserves)}</div>
                  <div className="text-xs text-muted">{PROPERTY.hoa.reserves_date}</div>
                </div>
                <div>
                  <div className="text-[11px] uppercase tracking-wider text-dim">Management</div>
                  <div className="text-sm text-zinc-100 mt-1">{PROPERTY.hoa.contact}</div>
                </div>
              </div>
              <div className="mt-4">
                <div className="text-[11px] uppercase tracking-wider text-dim mb-2">ARC rules summary</div>
                <ul className="space-y-1.5">
                  {PROPERTY.hoa.arc.map((r, i) => (
                    <li key={i} className="flex items-start gap-2 text-sm text-zinc-200">
                      <Icon name="AlertTriangle" size={12} className="text-amber-300 mt-1" />
                      <span>{r}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </Card>
          </Section>

          <Section title="Nearby">
            <Card className="p-4">
              <ul className="grid md:grid-cols-2 gap-2">
                {NEARBY.map((n, i) => (
                  <li key={i} className="flex items-start gap-2">
                    <span className="mt-1.5 w-1.5 h-1.5 rounded-full bg-teal-400 shrink-0" />
                    <div>
                      <div className="text-sm text-zinc-100">{n.name}</div>
                      <div className="text-xs text-muted">{n.note}</div>
                    </div>
                  </li>
                ))}
              </ul>
            </Card>
          </Section>

          <Section title="Service provider log">
            <div className="space-y-2">
              {state.providers.map(p => (
                <Card key={p.id} className="p-3">
                  <div className="grid md:grid-cols-[140px_1fr_140px_1fr_auto] gap-2 items-center">
                    <Select value={p.category}
                      onChange={(v) => dispatch({ type: "UPDATE_PROVIDER", id: p.id, patch: { category: v } })}
                      options={["HOA", "County", "Plumber", "Electrician", "HVAC", "Landscaper", "Roofer", "Pest", "Cleaner", "Handyman", "Other"]} />
                    <TextInput value={p.name} placeholder="Name / company"
                      onChange={(e) => dispatch({ type: "UPDATE_PROVIDER", id: p.id, patch: { name: e.target.value } })} />
                    <TextInput value={p.phone} placeholder="Phone"
                      onChange={(e) => dispatch({ type: "UPDATE_PROVIDER", id: p.id, patch: { phone: e.target.value } })} />
                    <TextInput value={p.notes} placeholder="Notes"
                      onChange={(e) => dispatch({ type: "UPDATE_PROVIDER", id: p.id, patch: { notes: e.target.value } })} />
                    {(p.id.startsWith("sp_")) && (
                      <button onClick={() => dispatch({ type: "REMOVE_PROVIDER", id: p.id })}
                        className="px-2 py-2 text-xs rounded-md border border-rose-400/30 text-rose-300 hover:bg-rose-400/10">
                        <Icon name="Trash2" size={12} />
                      </button>
                    )}
                  </div>
                </Card>
              ))}
            </div>
            <Card className="p-4 mt-3">
              <div className="text-[11px] uppercase tracking-wider text-dim mb-2">Add provider</div>
              <div className="grid md:grid-cols-[140px_1fr_140px_1fr_auto] gap-2">
                <Select value={draft.category} onChange={(v) => setDraft({ ...draft, category: v })}
                  options={["Plumber", "Electrician", "HVAC", "Landscaper", "Roofer", "Pest", "Cleaner", "Handyman", "HOA", "County", "Other"]} />
                <TextInput value={draft.name} placeholder="Name / company"
                  onChange={(e) => setDraft({ ...draft, name: e.target.value })} />
                <TextInput value={draft.phone} placeholder="Phone"
                  onChange={(e) => setDraft({ ...draft, phone: e.target.value })} />
                <TextInput value={draft.notes} placeholder="Notes"
                  onChange={(e) => setDraft({ ...draft, notes: e.target.value })} />
                <button onClick={addProvider}
                  className="px-3 py-2 text-sm rounded-md border border-teal-400/40 text-teal-300 hover:bg-teal-400/10">
                  Add
                </button>
              </div>
            </Card>
          </Section>
        </div>
      );
    }

    /* ---------- Import / Export ---------- */
    function ImportExportPanel({ state, dispatch, onClose }) {
      const [paste, setPaste] = useState("");
      const [error, setError] = useState("");
      const [copied, setCopied] = useState(false);
      const json = useMemo(() => JSON.stringify(state, null, 2), [state]);

      const copy = async () => {
        try {
          await navigator.clipboard.writeText(json);
          setCopied(true); setTimeout(() => setCopied(false), 1800);
        } catch {
          setError("Clipboard not available — select and copy manually below.");
        }
      };

      const importState = () => {
        setError("");
        try {
          const data = JSON.parse(paste);
          if (typeof data !== "object" || !data) throw new Error("Not an object.");
          dispatch({ type: "REPLACE_STATE", payload: data });
          onClose();
        } catch (e) {
          setError("Invalid JSON: " + e.message);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/70 z-40 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-panel border rounded-xl max-w-2xl w-full p-5"
               style={{ borderColor: "var(--border-strong)" }}
               onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-3">
              <h3 className="font-serif text-xl">Save / Load</h3>
              <button onClick={onClose} className="text-dim hover:text-zinc-100"><Icon name="X" size={18} /></button>
            </div>
            <div className="text-xs text-muted mb-3">No localStorage is used. Copy this JSON to back up your work; paste it back to restore.</div>

            <div className="text-[11px] uppercase tracking-wider text-dim mb-1">Current state</div>
            <textarea readOnly value={json} rows={10}
              className="w-full bg-zinc-950/60 border rounded-md px-3 py-2 text-xs font-mono text-zinc-100"
              style={{ borderColor: "var(--border-strong)" }} />
            <div className="flex gap-2 mt-2">
              <button onClick={copy}
                className="px-3 py-2 text-sm rounded-md border border-teal-400/40 text-teal-300 hover:bg-teal-400/10 inline-flex items-center gap-1.5">
                <Icon name="Copy" size={14} /> {copied ? "Copied" : "Copy state"}
              </button>
              <button onClick={() => { if (confirm("Reset to default data? Unsaved changes will be lost.")) dispatch({ type: "RESET" }); }}
                className="px-3 py-2 text-sm rounded-md border border-rose-400/30 text-rose-300 hover:bg-rose-400/10 inline-flex items-center gap-1.5">
                <Icon name="RotateCcw" size={14} /> Reset to defaults
              </button>
            </div>

            <div className="text-[11px] uppercase tracking-wider text-dim mt-5 mb-1">Restore from JSON</div>
            <textarea value={paste} onChange={(e) => setPaste(e.target.value)} rows={6}
              placeholder="Paste previously exported JSON here..."
              className="w-full bg-zinc-950/60 border rounded-md px-3 py-2 text-xs font-mono text-zinc-100"
              style={{ borderColor: "var(--border-strong)" }} />
            {error && <div className="text-xs text-rose-300 mt-2">{error}</div>}
            <div className="flex gap-2 mt-2">
              <button onClick={importState}
                className="px-3 py-2 text-sm rounded-md border border-teal-400/40 text-teal-300 hover:bg-teal-400/10 inline-flex items-center gap-1.5">
                <Icon name="Upload" size={14} /> Import state
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ---------- App shell ---------- */
    const TABS = [
      { id: "dashboard",   label: "Dashboard",     icon: "Home" },
      { id: "inspection",  label: "Inspection",    icon: "ClipboardCheck" },
      { id: "negotiation", label: "Negotiation",   icon: "Scale" },
      { id: "closing",     label: "Closing & Move-In", icon: "Calendar" },
      { id: "renovation",  label: "Renovation",    icon: "Wrench" },
      { id: "market",      label: "Market",        icon: "TrendingUp" },
      { id: "community",   label: "Community",     icon: "Users" }
    ];

    function App() {
      const [state, dispatch] = useReducer(reducer, initialState);
      const [active, setActive] = useState("dashboard");
      const [showIO, setShowIO] = useState(false);

      useEffect(() => {
        const splash = document.getElementById("splash");
        if (splash) splash.remove();
      }, []);

      let content;
      if (active === "dashboard")        content = <DashboardTab state={state} dispatch={dispatch} />;
      else if (active === "inspection")  content = <InspectionTab state={state} dispatch={dispatch} />;
      else if (active === "negotiation") content = <NegotiationTab state={state} dispatch={dispatch} />;
      else if (active === "closing")     content = <ClosingTab state={state} dispatch={dispatch} />;
      else if (active === "renovation")  content = <RenovationTab state={state} dispatch={dispatch} />;
      else if (active === "market")      content = <MarketTab state={state} dispatch={dispatch} />;
      else                               content = <CommunityTab state={state} dispatch={dispatch} />;

      return (
        <div className="min-h-screen">
          {/* Top bar */}
          <header className="border-b" style={{ borderColor: "var(--border)" }}>
            <div className="max-w-[960px] mx-auto px-5 py-4 flex items-center justify-between gap-3">
              <div className="flex items-center gap-3 min-w-0">
                <div className="w-9 h-9 rounded-lg bg-accent-soft border border-teal-400/30 grid place-items-center text-accent">
                  <Icon name="Compass" size={18} />
                </div>
                <div className="min-w-0">
                  <div className="text-[11px] uppercase tracking-[0.18em] text-accent/80">Homebuyer Command Center</div>
                  <div className="font-serif text-lg text-zinc-100 truncate">2736 Royal Crest Dr · Midlothian, VA</div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => setShowIO(true)}
                  className="px-3 py-2 text-xs rounded-md border border-teal-400/40 text-teal-300 hover:bg-teal-400/10 inline-flex items-center gap-1.5">
                  <Icon name="Save" size={14} /> Save / Load
                </button>
              </div>
            </div>
            <nav className="max-w-[960px] mx-auto px-2 sm:px-5">
              <div className="flex gap-1 overflow-x-auto scrollbar-tab">
                {TABS.map(t => {
                  const isActive = active === t.id;
                  return (
                    <button key={t.id} onClick={() => setActive(t.id)}
                      className={"shrink-0 inline-flex items-center gap-2 px-3 py-2.5 text-sm border-b-2 transition-colors " +
                        (isActive
                          ? "border-teal-400 text-teal-200"
                          : "border-transparent text-muted hover:text-zinc-100")}>
                      <Icon name={t.icon} size={15} /> {t.label}
                    </button>
                  );
                })}
              </div>
            </nav>
          </header>

          <main className="max-w-[960px] mx-auto px-5 py-6">
            {content}
          </main>

          <footer className="max-w-[960px] mx-auto px-5 pb-8 pt-2 text-[11px] text-dim">
            Personal-use planning tool · all data lives in this browser tab · use Save/Load to back up.
          </footer>

          {showIO && <ImportExportPanel state={state} dispatch={dispatch} onClose={() => setShowIO(false)} />}
        </div>
      );
    }

    /* ---------- Mount ---------- */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
