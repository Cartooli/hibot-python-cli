name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify VERSION matches sw.js CACHE_NAME
        run: |
          set -euo pipefail
          VER=$(tr -d '[:space:]' < VERSION)
          test -n "$VER"
          grep -Fq "const CACHE_NAME = 'bws-v${VER}'" sw.js

      - name: WCAG contrast audit (presets + bundles)
        run: node scripts/contrast-audit.mjs

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
