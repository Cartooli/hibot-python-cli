<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HTML Viewer — paste HTML, CSS &amp; JS, see it run | Hi Bot Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="A clean, fast HTML viewer from Hi, Bot. Paste HTML, CSS, and JavaScript and see it render live in a safe sandbox — download as HTML, save as PDF, no account." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://code.hibot.space/viewer.html" />
  <meta property="og:title" content="HTML Viewer — Hi Bot Code" />
  <meta property="og:description" content="Paste HTML, CSS, and JavaScript and see it render live in a safe sandbox." />
  <meta property="og:image" content="https://code.hibot.space/get-started-coding-og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <link rel="canonical" href="https://code.hibot.space/viewer.html" />
  <link rel="stylesheet" href="/assets/fonts/fonts.css">
  <link rel="stylesheet" href="/assets/hibot-theme.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2.13.7" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="color-scheme" content="dark" />

  <style>
    :root {
      --bg: #0A0A0A; --ink: #E8E8E3; --muted: #8B95A1; --accent: #F5A524; --accent-soft: rgba(245, 165, 36, 0.9);
      --accent-dim: rgba(245,165,36,.14); --panel: #111418; --panel-2: #1B1F26;
      --border: rgba(139,149,161,.22); --border-hover: rgba(139,149,161,.45);
      --radius: 12px; --radius-sm: 8px; --shadow: 0 8px 30px rgba(0,0,0,.35);
      --font-display: 'Outfit', ui-sans-serif, system-ui, sans-serif;
      --font-ui: 'DM Sans', ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
      --nav-h: 50px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Site nav: assets/hibot-theme.css */

    /* App shell */
    .studio { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
    .toolbar {
      flex: 0 0 auto; display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .toolbar .title { font-family: var(--font-display); font-weight: 700; font-size: 15px; margin-right: 6px; }
    .toolbar .title span { color: var(--accent); }
    .toolbar .spacer { flex: 1; }
    .toolbar .hint { color: var(--muted); font-size: 12px; }
    .tbtn {
      display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
      font-family: var(--font-ui); font-size: 13px; font-weight: 600;
      padding: 8px 14px; min-height: 40px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--panel-2); color: var(--ink);
      transition: border-color .15s, background .15s, color .15s, transform .1s;
    }
    .tbtn:hover { border-color: var(--accent-soft); color: var(--accent); }
    .tbtn:active { transform: scale(.97); }
    .tbtn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .tbtn.primary:hover { background: #e19412; color: var(--bg); }
    .tbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .autorun { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; user-select: none; }
    .autorun input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

    /* Split panes */
    .panes { flex: 1 1 auto; display: flex; min-height: 0; }
    .pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    .pane-editor { flex: 1 1 50%; border-right: 1px solid var(--border); }
    .pane-preview { flex: 1 1 50%; }

    .gutter {
      flex: 0 0 6px; cursor: col-resize; background: var(--border);
      position: relative; transition: background .15s;
    }
    .gutter:hover, .gutter.dragging { background: var(--accent-soft); }
    .gutter::after { content: ""; position: absolute; inset: 0 -5px; }

    /* Editor tabs */
    .tabs { flex: 0 0 auto; display: flex; align-items: stretch; background: var(--panel); border-bottom: 1px solid var(--border); }
    .tab {
      appearance: none; border: none; background: none; cursor: pointer;
      font-family: var(--font-ui); font-size: 13px; font-weight: 600; color: var(--muted);
      padding: 11px 18px; min-height: 42px; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s, background .15s;
    }
    .tab:hover { color: var(--ink); background: rgba(255,255,255,.04); }
    .tab[aria-selected="true"] { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    .editors { flex: 1 1 auto; position: relative; min-height: 0; }
    .code {
      position: absolute; inset: 0; width: 100%; height: 100%;
      resize: none; border: none; outline: none;
      background: #0c0e12; color: var(--ink);
      font-family: var(--font-mono); font-size: 14px; line-height: 1.6;
      padding: 16px; tab-size: 2;
      white-space: pre; overflow: auto;
    }
    .code::placeholder { color: var(--muted); }
    .code[hidden] { display: none; }
    .code:focus { box-shadow: inset 0 0 0 2px var(--accent-dim); }

    /* Preview */
    .preview-head { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; background: var(--panel); border-bottom: 1px solid var(--border); padding: 0 14px; min-height: 42px; }
    .preview-head .dot { color: var(--muted); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
    .preview-head .dot svg { color: var(--accent); }
    .preview-wrap { flex: 1 1 auto; position: relative; background: #fff; min-height: 0; }
    #preview { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: #fff; }

    /* Mobile (secondary): stack panes, swap to row-resize semantics off */
    @media (max-width: 820px) {
      body { overflow: auto; }
      .studio { min-height: calc(100vh - var(--nav-h)); }
      .panes { flex-direction: column; }
      .pane-editor, .pane-preview { flex: 1 1 auto; border-right: none; }
      .pane-editor { border-bottom: 1px solid var(--border); min-height: 320px; }
      .pane-preview { min-height: 320px; }
      .gutter { display: none; }
      .toolbar { flex-wrap: wrap; }
      .toolbar .hint { display: none; }
    }

    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; } }
    @media (prefers-contrast: more), (prefers-contrast: high) {
      :root { --border: rgba(255,255,255,.45); --muted: #d4dce8; --ink: #fff; }
    }
  </style>
</head>

<div class="studio">
  <div class="toolbar">

    <button class="tbtn" id="copy" type="button" title="Copy the code from the active tab">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy
    </button>
    <button class="tbtn" id="pdf" type="button" title="Opens your browser's print dialog — choose 'Save as PDF' as the destination">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>

    </button>
    <button class="tbtn" id="download-html" type="button" title="Save one .html file — recipients open it in a browser like any web page. Only share with people you trust.">

    </button>
    <button class="tbtn" id="share" type="button" title="Copy a link that contains this code">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>

    <div class="gutter" id="gutter" role="separator" aria-orientation="vertical" aria-label="Resize panes" tabindex="0"></div>

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Live preview
        </span>

<script src="/assets/hibot-share.js"></script>
<script>
(function () {
  "use strict";

  var encodeCode = window.hibotShare && window.hibotShare.encodeCode;
  var decodeCode = window.hibotShare && window.hibotShare.decodeCode;
  if (!encodeCode || !decodeCode) {
    encodeCode = function (obj) {
      var bytes = new TextEncoder().encode(JSON.stringify(obj));
      var bin = "";
      bytes.forEach(function (b) { bin += String.fromCharCode(b); });
      return btoa(bin);
    };
    decodeCode = function (b64) {
      var bin = atob(b64);
      var bytes = Uint8Array.from(bin, function (c) { return c.charCodeAt(0); });
      return JSON.parse(new TextDecoder().decode(bytes));
    };
  }

  var STORAGE_KEY = "hibot-viewer-v1";
  var STARTER = {
    html: '<h1>Hello! 👋</h1>\n<p>Edit the HTML, CSS, and JS tabs and watch this update.</p>\n<button id="go">Click me</button>\n<p id="out"></p>',
    css:  'body { font-family: system-ui, sans-serif; padding: 2rem; color: #1a1a1a; }\nh1 { color: #F5A524; }\nbutton { font: inherit; padding: .6rem 1.1rem; border: 0; border-radius: 8px;\n  background: #F5A524; color: #111; cursor: pointer; }',
    js:   'document.getElementById("go").addEventListener("click", function () {\n  document.getElementById("out").textContent = "It works! " + new Date().toLocaleTimeString();\n});'
  };

  var els = {
    html: document.getElementById("code-html"),
    css:  document.getElementById("code-css"),
    js:   document.getElementById("code-js")
  };
  var preview = document.getElementById("preview");
  var autorun = document.getElementById("autorun");
  var tabs = Array.prototype.slice.call(document.querySelectorAll(".tab"));

  function fromShareLink() {
    var m = /[#&]code=([^&]+)/.exec(location.hash);
    if (!m) return null;
    try {
      var obj = decodeCode(decodeURIComponent(m[1]));
      if (obj && typeof obj.html === "string") return obj;
    } catch (e) { /* malformed link — fall through to other sources */ }
    return null;
  }

  // --- Persistence (local only; the user's own code, never sent anywhere) ---
  function load() {
    var shared = fromShareLink();
    if (shared) { applySrc(shared); return; }
    var saved = null;
    try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch (e) { saved = null; }
    applySrc((saved && typeof saved.html === "string") ? saved : STARTER);
  }
  function applySrc(src) {
    els.html.value = src.html || "";
    els.css.value  = src.css  || "";
    els.js.value   = src.js   || "";
  }
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        html: els.html.value, css: els.css.value, js: els.js.value
      }));
    } catch (e) { /* storage full or blocked — non-fatal */ }
  }

  // --- Render: assemble a full document and hand it to the sandboxed iframe ---
  function buildDoc() {
    return '<!DOCTYPE html><html><head><meta charset="utf-8">' +
      '<meta name="viewport" content="width=device-width, initial-scale=1">' +
      "<title>Hi Bot Code — preview</title>" +
      // Print defaults — placed before the user's <style> so user rules win.
      // print-color-adjust keeps user backgrounds/colors in the saved PDF.
      '<style id="hibot-print-defaults">@media print{' +
        "html{-webkit-print-color-adjust:exact;print-color-adjust:exact;}" +
        "@page{margin:12mm;}}</style>" +
      "<style>" + els.css.value + "</style></head><body>" +
      els.html.value +
      "<script>\ntry {\n" + els.js.value + "\n} catch (err) {\n" +
      "  document.body.insertAdjacentHTML('beforeend', '<pre style=\"color:#b00020;white-space:pre-wrap;font:13px/1.5 monospace;padding:8px;border-top:1px solid #eee\">' + String(err) + '</pre>');\n" +
      "}\n<\/script>" +
      // Print bridge: the sandboxed iframe prints its own full document (correct
      // pagination + exact CSS). Gated to hibot-print messages from the parent.
      "<script>\nwindow.addEventListener('message', function (e) {\n" +
      "  if (e.source !== window.parent) return;\n" +
      "  if (e.data && e.data.type === 'hibot-print') { window.print(); }\n" +
      "});\n<\/script></body></html>";
  }
  function render() {
    // srcdoc keeps output in a unique opaque origin; sandbox has no allow-same-origin,
    // so it cannot reach this page's cookies, localStorage, or same-origin APIs.
    preview.srcdoc = buildDoc();
  }

  // --- Debounced live update ---
  var timer = null;
  function scheduleRender() {
    save();
    // Once the user edits, drop the share-link hash so a refresh restores their
    // own (autosaved) edits rather than re-loading the original shared code.
    if (/[#&]code=/.test(location.hash)) history.replaceState(null, "", location.pathname);
    if (!autorun.checked) return;
    if (timer) clearTimeout(timer);
    timer = setTimeout(render, 350);
  }

  Object.keys(els).forEach(function (k) {
    els[k].addEventListener("input", scheduleRender);
    // Insert two spaces on Tab instead of leaving the field.
    els[k].addEventListener("keydown", function (e) {
      if (e.key === "Tab") {
        e.preventDefault();
        var s = this.selectionStart, end = this.selectionEnd;
        this.value = this.value.slice(0, s) + "  " + this.value.slice(end);
        this.selectionStart = this.selectionEnd = s + 2;
      }
    });
  });

  // Ctrl/Cmd+Enter runs immediately.
  document.addEventListener("keydown", function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); render(); }
  });

  document.getElementById("run").addEventListener("click", render);

  // --- Save as PDF: ask the sandboxed preview to print itself (native PDF) ---
  document.getElementById("pdf").addEventListener("click", function () {
    if (!preview.contentWindow) return; // iframe not ready yet
    preview.contentWindow.postMessage({ type: "hibot-print" }, "*");
  });

  // --- Download HTML: same document as sandbox preview (buildDoc) ---
  var downloadBtn = document.getElementById("download-html");
  var flashDownload = makeFlasher(downloadBtn, "Download HTML");
  downloadBtn.addEventListener("click", function () {
    var doc = buildDoc();
    var blob = new Blob([doc], { type: "text/html;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "hibot-preview.html";
    a.rel = "noopener";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    flashDownload("Saved!");
  });

  // --- Clipboard: async API with a hidden-textarea execCommand fallback ---
  function copyText(text, onResult) {
    function fallbackCopy() {
      var t = document.createElement("textarea");
      t.value = text; t.setAttribute("readonly", "");
      t.style.position = "fixed"; t.style.opacity = "0";
      document.body.appendChild(t); t.select();
      var ok = false;
      try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
      document.body.removeChild(t);
      onResult(ok);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { onResult(true); }, fallbackCopy);
    } else {
      fallbackCopy();
    }
  }
  // Briefly swap a button's trailing text label, then restore it.
  function makeFlasher(btn, defaultLabel) {
    var labelNode = btn.lastChild; // trailing text node
    var t = null;
    return function (text) {
      labelNode.textContent = " " + text;
      if (t) clearTimeout(t);
      t = setTimeout(function () { labelNode.textContent = " " + defaultLabel; }, 1800);
    };
  }

  // --- Copy: copy the active editor tab's code ---
  var copyBtn = document.getElementById("copy");
  var flashCopy = makeFlasher(copyBtn, "Copy");
  copyBtn.addEventListener("click", function () {
    var activeTab = document.querySelector('.tab[aria-selected="true"]');
    var area = document.getElementById(activeTab.dataset.target);
    copyText(area.value, function (ok) { flashCopy(ok ? "Copied!" : "Copy failed"); });
  });

  // --- Share: build a self-contained link and copy it to the clipboard ---
  var shareBtn = document.getElementById("share");
  var flashShare = makeFlasher(shareBtn, "Share");
  shareBtn.addEventListener("click", function () {
    var payload = encodeURIComponent(encodeCode({
      html: els.html.value, css: els.css.value, js: els.js.value
    }));
    var url = location.origin + location.pathname + "#code=" + payload;
    history.replaceState(null, "", "#code=" + payload);
    copyText(url, function (ok) { flashShare(ok ? "Link copied!" : "Copy failed"); });
  });

  document.getElementById("reset").addEventListener("click", function () {
    if (!confirm("Reset all three editors to the starter example?")) return;
    if (location.hash) history.replaceState(null, "", location.pathname);
    els.html.value = STARTER.html; els.css.value = STARTER.css; els.js.value = STARTER.js;
    save(); render();
  });

  // --- Tabs ---
  function selectTab(tab) {
    tabs.forEach(function (t) {
      var on = t === tab;
      t.setAttribute("aria-selected", on ? "true" : "false");
      document.getElementById(t.dataset.target).hidden = !on;
    });
    document.getElementById(tab.dataset.target).focus();
  }
  tabs.forEach(function (tab, i) {
    tab.addEventListener("click", function () { selectTab(tab); });
    tab.addEventListener("keydown", function (e) {
      if (e.key !== "ArrowRight" && e.key !== "ArrowLeft") return;
      e.preventDefault();
      var next = (i + (e.key === "ArrowRight" ? 1 : tabs.length - 1)) % tabs.length;
      tabs[next].focus(); selectTab(tabs[next]);
    });
  });

  // --- Draggable split (desktop) ---
  var gutter = document.getElementById("gutter");
  var panes = document.getElementById("panes");
  var editorPane = document.getElementById("paneEditor");
  var dragging = false;
  function setSplit(clientX) {
    var rect = panes.getBoundingClientRect();
    var pct = ((clientX - rect.left) / rect.width) * 100;
    pct = Math.max(20, Math.min(80, pct));
    editorPane.style.flex = "0 0 " + pct + "%";
  }
  gutter.addEventListener("pointerdown", function (e) {
    dragging = true; gutter.classList.add("dragging");
    gutter.setPointerCapture(e.pointerId);
    document.body.style.userSelect = "none";
  });
  gutter.addEventListener("pointermove", function (e) { if (dragging) setSplit(e.clientX); });
  gutter.addEventListener("pointerup", function (e) {
    dragging = false; gutter.classList.remove("dragging");
    try { gutter.releasePointerCapture(e.pointerId); } catch (err) {}
    document.body.style.userSelect = "";
  });
  gutter.addEventListener("keydown", function (e) {
    var cur = parseFloat(editorPane.style.flexBasis) || 50;
    if (e.key === "ArrowLeft")  { editorPane.style.flex = "0 0 " + Math.max(20, cur - 4) + "%"; }
    if (e.key === "ArrowRight") { editorPane.style.flex = "0 0 " + Math.min(80, cur + 4) + "%"; }
  });

  // --- Boot ---
  load();
  render();
})();
</script>
</body>
</html>
