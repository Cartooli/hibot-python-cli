<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exit Waterfall Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fafafa;
            color: #2c3e50;
            line-height: 1.6;
        }

        body {
            padding: 1rem;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: white;
            border-radius: 8px;
            border: 1px solid #ecf0f1;
            gap: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-secondary {
            background-color: white;
            color: #2c3e50;
            border: 1px solid #bdc3c7;
        }

        .btn-secondary:hover {
            background-color: #ecf0f1;
        }

        .btn-add {
            background-color: #27ae60;
            color: white;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-add:hover {
            background-color: #229954;
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        /* Main layout */
        .container {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
            }

            button {
                flex: 1;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 0.75rem;
            }

            header {
                padding: 1rem;
                margin-bottom: 1.5rem;
            }

            h1 {
                font-size: 1.2rem;
            }

            .container {
                gap: 1.5rem;
            }
        }

        /* Input panel */
        .panel {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #ecf0f1;
        }

        @media (max-width: 640px) {
            .panel {
                padding: 1rem;
            }
        }

        .panel h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        input[type="range"],
        select {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            background-color: white;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #ecf0f1;
            border: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            border: none;
        }

        .exit-price-display {
            font-size: 1.8rem;
            font-weight: 600;
            color: #3498db;
            margin-top: 0.75rem;
        }

        /* Shareholders section */
        .shareholders {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #ecf0f1;
        }

        .shareholders h3 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .shareholder-item {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background-color: #fafafa;
            border-radius: 6px;
            border: 1px solid #ecf0f1;
        }

        @media (max-width: 640px) {
            .shareholder-item {
                grid-template-columns: 1fr;
                gap: 0.5rem;
                padding: 0.75rem;
                margin-bottom: 0.75rem;
            }
        }

        .shareholder-item label {
            font-size: 0.7rem;
            margin-bottom: 0.3rem;
        }

        .shareholder-item input {
            margin-bottom: 0;
            font-size: 0.85rem;
            padding: 0.6rem;
        }

        .shareholder-checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            grid-column: 1 / -1;
        }

        .checkbox-field {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-field input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-field label {
            margin: 0;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: none;
            letter-spacing: normal;
        }

        .shareholder-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 0.5rem;
        }

        .btn-delete {
            flex: 1;
        }

        /* Results panel */
        .results-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        @media (max-width: 640px) {
            .results-panel {
                gap: 1.5rem;
            }
        }

        /* Chart */
        #waterfallChart {
            width: 100%;
            height: 280px;
            border: 1px solid #ecf0f1;
            border-radius: 6px;
            background-color: #fafafa;
        }

        @media (max-width: 640px) {
            #waterfallChart {
                height: 220px;
            }
        }

        /* Table */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .results-table {
                font-size: 0.8rem;
            }
        }

        .results-table thead {
            background-color: #ecf0f1;
            border-bottom: 2px solid #bdc3c7;
        }

        .results-table th {
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .results-table td {
            padding: 0.75rem;
            border-bottom: 1px solid #ecf0f1;
        }

        @media (max-width: 640px) {
            .results-table th,
            .results-table td {
                padding: 0.5rem;
            }
        }

        .results-table tbody tr:hover {
            background-color: #fafafa;
        }

        .text-right {
            text-align: right;
            font-family: "SF Mono", Monaco, "Roboto Mono", monospace;
            font-size: 0.95em;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #95a5a6;
            font-size: 0.9rem;
        }

        /* Print styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            header {
                margin-bottom: 1.5rem;
                border: none;
                page-break-after: avoid;
                border-bottom: 2px solid #2c3e50;
            }

            .header-actions {
                display: none;
            }

            .container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .panel {
                border: none;
                padding: 0;
                page-break-inside: avoid;
            }

            .panel:first-of-type {
                display: none;
            }

            .results-panel {
                gap: 1.5rem;
            }

            #waterfallChart {
                border: 1px solid #2c3e50;
                page-break-inside: avoid;
            }

            .results-table {
                page-break-inside: avoid;
            }

            h1, h2 {
                page-break-after: avoid;
                color: #2c3e50;
            }

            .results-table thead {
                background-color: #e8e8e8;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Exit Waterfall Simulator</h1>
        <div class="header-actions">
            <button class="btn-secondary" onclick="resetData()">Reset</button>
            <button class="btn-primary" onclick="window.print()">Print / Export PDF</button>
        </div>
    </header>

    <div class="container">
        <!-- Input Panel -->
        <div class="panel">
            <h2>Configuration</h2>

            <div class="form-group">
                <label>Exit Price ($M)</label>
                <input type="range" id="exitPrice" min="0" max="500" step="5" value="100">
                <div class="exit-price-display" id="exitPriceDisplay">$100.0M</div>
            </div>

            <div class="shareholders">
                <h3>Shareholders</h3>
                <div id="shareholdersList"></div>
                <button class="btn-add" onclick="addShareholder()">+ Add Shareholder</button>
            </div>
        </div>

        <!-- Results Panel -->
        <div class="panel results-panel">
            <div>
                <h2>Waterfall Analysis</h2>
                <svg id="waterfallChart"></svg>
            </div>

            <div>
                <h2>Distribution Results</h2>
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Class</th>
                            <th class="text-right">Shares</th>
                            <th class="text-right">Pref ($M)</th>
                            <th class="text-right">Proceeds ($M)</th>
                            <th class="text-right">Return %</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr>
                            <td colspan="5" class="empty-state">Add shareholders to calculate</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Application state
        let appState = {
            shareholders: [
                { id: 1, class: 'Common', shares: 1000, preference: 0, participating: false, capMultiple: 1 },
                { id: 2, class: 'Preferred A', shares: 500, preference: 10, participating: false, capMultiple: 1 }
            ],
            nextId: 3
        };

        // Initialize on load
        window.addEventListener('load', () => {
            renderShareholders();
            updateCalculations();
        });

        // Render shareholder input fields
        function renderShareholders() {
            const container = document.getElementById('shareholdersList');

            if (appState.shareholders.length === 0) {
                container.innerHTML = '<div class="empty-state">No shareholders added</div>';
                return;
            }

            container.innerHTML = appState.shareholders.map(sh => `
                <div class="shareholder-item">
                    <div>
                        <label>Class Name</label>
                        <input type="text" value="${sh.class}"
                            onchange="updateShareholder(${sh.id}, 'class', this.value)"
                            placeholder="e.g., Common">
                    </div>
                    <div>
                        <label>Shares</label>
                        <input type="number" value="${sh.shares}"
                            onchange="updateShareholder(${sh.id}, 'shares', parseFloat(this.value) || 0)"
                            min="0" step="100">
                    </div>
                    <div>
                        <label>Preference ($M)</label>
                        <input type="number" value="${sh.preference}"
                            onchange="updateShareholder(${sh.id}, 'preference', parseFloat(this.value) || 0)"
                            min="0" step="0.1">
                    </div>
                    <div>
                        <label>Cap Multiple</label>
                        <input type="number" value="${sh.capMultiple}"
                            onchange="updateShareholder(${sh.id}, 'capMultiple', parseFloat(this.value) || 1)"
                            min="0.5" max="10" step="0.5">
                    </div>
                    <div class="shareholder-checkbox-group">
                        <div class="checkbox-field">
                            <input type="checkbox" id="part_${sh.id}" ${sh.participating ? 'checked' : ''}
                                onchange="updateShareholder(${sh.id}, 'participating', this.checked)">
                            <label for="part_${sh.id}">Participating</label>
                        </div>
                    </div>
                    <div class="shareholder-actions">
                        <button class="btn-delete" onclick="deleteShareholder(${sh.id})">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        // Add shareholder
        function addShareholder() {
            const newId = appState.nextId++;
            appState.shareholders.push({
                id: newId,
                class: `Preferred ${String.fromCharCode(65 + appState.shareholders.length - 1)}`,
                shares: 100,
                preference: 5,
                participating: false,
                capMultiple: 1
            });
            renderShareholders();
            updateCalculations();
        }

        // Update shareholder property
        function updateShareholder(id, field, value) {
            const shareholder = appState.shareholders.find(s => s.id === id);
            if (shareholder) {
                shareholder[field] = value;
                updateCalculations();
            }
        }

        // Delete shareholder
        function deleteShareholder(id) {
            appState.shareholders = appState.shareholders.filter(s => s.id !== id);
            renderShareholders();
            updateCalculations();
        }

        // Update exit price display
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('exitPrice');
            if (input) {
                input.addEventListener('input', () => {
                    const price = parseFloat(input.value);
                    document.getElementById('exitPriceDisplay').textContent = `$${price.toFixed(1)}M`;
                    updateCalculations();
                });
            }
        });

        // Main waterfall calculation
        function calculateWaterfall() {
            const exitPrice = new Decimal(document.getElementById('exitPrice').value);
            const shareholders = appState.shareholders;
            const results = [];

            // Initialize results with basic info
            shareholders.forEach(sh => {
                results.push({
                    ...sh,
                    proceeds: 0,
                    returned: 0
                });
            });

            let remaining = exitPrice;

            // Step 1: Preferred shareholders get their preference first
            for (let result of results) {
                if (result.preference > 0 && remaining.greaterThan(0)) {
                    const prefAmount = new Decimal(result.preference);
                    const payment = Decimal.min(prefAmount, remaining);
                    result.proceeds = parseFloat(payment);
                    remaining = remaining.minus(payment);
                }
            }

            // Step 2: Participating preferred gets pro-rata of remaining
            const participatingInvested = results
                .filter(r => r.participating && r.preference > 0)
                .reduce((sum, r) => sum + r.preference, 0);

            if (remaining.greaterThan(0) && participatingInvested > 0) {
                for (let result of results) {
                    if (result.participating && result.preference > 0) {
                        const invested = new Decimal(result.preference);
                        const totalInvested = new Decimal(participatingInvested);
                        const proRata = invested.dividedBy(totalInvested);
                        const capAmount = new Decimal(result.preference).times(new Decimal(result.capMultiple));
                        const maxPartipation = Decimal.max(
                            new Decimal(0),
                            capAmount.minus(new Decimal(result.preference))
                        );
                        const participation = Decimal.min(
                            remaining.times(proRata),
                            maxPartipation
                        );
                        result.proceeds = new Decimal(result.proceeds).plus(participation).toNumber();
                        remaining = remaining.minus(participation);
                    }
                }
            }

            // Step 3: Common shareholders get pro-rata of what's left
            const totalCommonShares = results
                .filter(r => r.preference === 0)
                .reduce((sum, r) => sum + r.shares, 0);

            if (remaining.greaterThan(0) && totalCommonShares > 0) {
                for (let result of results) {
                    if (result.preference === 0) {
                        const shareCount = new Decimal(result.shares);
                        const totalShares = new Decimal(totalCommonShares);
                        const proRata = shareCount.dividedBy(totalShares);
                        const payment = remaining.times(proRata);
                        result.proceeds = parseFloat(payment);
                    }
                }
            }

            // Calculate return multiples
            for (let result of results) {
                if (result.preference > 0) {
                    result.returned = result.proceeds / result.preference;
                }
            }

            return results.sort((a, b) => b.proceeds - a.proceeds);
        }

        // Update calculations and render
        function updateCalculations() {
            const results = calculateWaterfall();
            const exitPrice = parseFloat(document.getElementById('exitPrice').value);

            renderTable(results, exitPrice);
            renderChart(results, exitPrice);
        }

        // Render results table
        function renderTable(results, exitPrice) {
            const tbody = document.getElementById('resultsBody');

            if (results.length === 0 || results.every(r => r.shares === 0 && r.preference === 0)) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Add shareholders to calculate</td></tr>';
                return;
            }

            tbody.innerHTML = results.map(r => {
                const pct = exitPrice > 0 ? ((r.proceeds / exitPrice) * 100).toFixed(1) : '0.0';
                return `
                    <tr>
                        <td>${r.class}</td>
                        <td class="text-right">${r.shares.toLocaleString()}</td>
                        <td class="text-right">${r.preference > 0 ? '$' + r.preference.toFixed(1) : '—'}</td>
                        <td class="text-right">$${r.proceeds.toFixed(2)}</td>
                        <td class="text-right">${pct}%</td>
                    </tr>
                `;
            }).join('');
        }

        // Render waterfall chart
        function renderChart(results, exitPrice) {
            const svg = document.getElementById('waterfallChart');
            const container = svg.parentElement;
            const width = container.offsetWidth;
            const height = 280;
            const margin = { top: 20, right: 20, bottom: 50, left: 50 };
            const chartW = width - margin.left - margin.right;
            const chartH = height - margin.top - margin.bottom;

            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('width', width);
            svg.setAttribute('height', height);
            svg.innerHTML = '';

            if (results.length === 0 || results.every(r => r.proceeds === 0)) {
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', width / 2);
                text.setAttribute('y', height / 2);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('fill', '#95a5a6');
                text.setAttribute('font-size', '14');
                text.textContent = 'Add shareholders to see waterfall';
                svg.appendChild(text);
                return;
            }

            const maxY = Math.max(exitPrice, 1);
            const yScale = chartH / maxY;

            // Background
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('width', width);
            bg.setAttribute('height', height);
            bg.setAttribute('fill', '#fafafa');
            svg.appendChild(bg);

            // Axes
            const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            yAxis.setAttribute('x1', margin.left);
            yAxis.setAttribute('y1', margin.top);
            yAxis.setAttribute('x2', margin.left);
            yAxis.setAttribute('y2', height - margin.bottom);
            yAxis.setAttribute('stroke', '#bdc3c7');
            yAxis.setAttribute('stroke-width', '1');
            svg.appendChild(yAxis);

            const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            xAxis.setAttribute('x1', margin.left);
            xAxis.setAttribute('y1', height - margin.bottom);
            xAxis.setAttribute('x2', width - margin.right);
            xAxis.setAttribute('y2', height - margin.bottom);
            xAxis.setAttribute('stroke', '#bdc3c7');
            xAxis.setAttribute('stroke-width', '1');
            svg.appendChild(xAxis);

            // Y-axis labels
            const steps = 4;
            for (let i = 0; i <= steps; i++) {
                const val = (i / steps) * maxY;
                const y = height - margin.bottom - (val * yScale);
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', margin.left - 8);
                text.setAttribute('y', y + 4);
                text.setAttribute('text-anchor', 'end');
                text.setAttribute('font-size', '11');
                text.setAttribute('fill', '#7f8c8d');
                text.textContent = `$${val.toFixed(0)}M`;
                svg.appendChild(text);
            }

            // Bars
            const barWidth = (chartW / results.length) * 0.7;
            const spacing = (chartW / results.length) * 0.3;

            results.forEach((r, i) => {
                const x = margin.left + i * (barWidth + spacing) + spacing / 2;
                const barHeight = r.proceeds * yScale;
                const y = height - margin.bottom - barHeight;

                // Bar
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x);
                rect.setAttribute('y', y);
                rect.setAttribute('width', barWidth);
                rect.setAttribute('height', barHeight);
                rect.setAttribute('fill', '#3498db');
                rect.setAttribute('opacity', '0.85');
                svg.appendChild(rect);

                // Value label
                const valueLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                valueLabel.setAttribute('x', x + barWidth / 2);
                valueLabel.setAttribute('y', y - 5);
                valueLabel.setAttribute('text-anchor', 'middle');
                valueLabel.setAttribute('font-size', '11');
                valueLabel.setAttribute('font-weight', '600');
                valueLabel.setAttribute('fill', '#2c3e50');
                valueLabel.textContent = `$${r.proceeds.toFixed(1)}M`;
                svg.appendChild(valueLabel);

                // Class label
                const classLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                classLabel.setAttribute('x', x + barWidth / 2);
                classLabel.setAttribute('y', height - margin.bottom + 18);
                classLabel.setAttribute('text-anchor', 'middle');
                classLabel.setAttribute('font-size', '10');
                classLabel.setAttribute('fill', '#34495e');
                classLabel.setAttribute('font-weight', '500');
                classLabel.textContent = r.class;
                svg.appendChild(classLabel);
            });
        }

        // Reset to default
        function resetData() {
            appState = {
                shareholders: [
                    { id: 1, class: 'Common', shares: 1000, preference: 0, participating: false, capMultiple: 1 },
                    { id: 2, class: 'Preferred A', shares: 500, preference: 10, participating: false, capMultiple: 1 }
                ],
                nextId: 3
            };
            document.getElementById('exitPrice').value = 100;
            document.getElementById('exitPriceDisplay').textContent = '$100.0M';
            renderShareholders();
            updateCalculations();
        }
    </script>
</body>
</html>
