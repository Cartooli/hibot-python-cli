<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OG render — Hi Bot Code</title>
  <style>
    @font-face {
      font-family: "Outfit";
      font-style: normal;
      font-weight: 800;
      font-display: block;
      src: url("../assets/fonts/QGYvz_MVcBeNP4NJtEtqUYLknw.woff2") format("woff2");
    }
    @font-face {
      font-family: "DM Sans";
      font-style: normal;
      font-weight: 500;
      font-display: block;
      src: url("../assets/fonts/rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K6z9mXg.woff2") format("woff2");
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }
    .card {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      background-image:
        radial-gradient(ellipse 120% 80% at 12% 8%, rgba(245, 165, 36, 0.14), transparent 55%),
        radial-gradient(ellipse 90% 70% at 88% 92%, rgba(245, 165, 36, 0.08), transparent 50%);
      color: #e8e8e3;
      font-family: "DM Sans", ui-sans-serif, system-ui, sans-serif;
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
    }
    .kicker {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #f5a524;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 20px;
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-weight: 800;
      font-size: 76px;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: #f8fafc;
      max-width: 14ch;
    }
    .sub {
      margin: 0;
      font-size: 28px;
      line-height: 1.45;
      color: #a8b5c9;
      max-width: 32ch;
    }
    .rule {
      margin-top: 40px;
      width: 120px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #f5a524, #e19412);
    }
    .domain {
      position: absolute;
      top: 56px;
      right: 80px;
      font-size: 20px;
      font-weight: 600;
      color: rgba(232, 232, 227, 0.55);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="domain">code.hibot.space</span>
    <div class="kicker">Hi, Bot family</div>
    <h1>Hi Bot Code</h1>
    <p class="sub">Learn HTML, CSS &amp; JavaScript in your browser — free, private, no install.</p>
    <div class="rule" aria-hidden="true"></div>
  </div>
</body>
</html>
