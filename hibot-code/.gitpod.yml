tasks:
  - name: Start Server
    init: echo "No build step required - static HTML app"
    command: |
      echo "🚀 Hi Bot Code is ready!"
      echo "Opening preview..."
      python3 -m http.server 8000

ports:
  - port: 8000
    onOpen: open-preview
    visibility: public
    description: Hi Bot Code

vscode:
  extensions:
    - dbaeumer.vscode-eslint
    - esbenp.prettier-vscode
